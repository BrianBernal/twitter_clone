<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Buddy Tour</title>
<style>
  :root {
    --bg: #fdfbf7; --panel: #ffffff; --ink: #2c2a3a; --muted: #6b6880;
    --accent: #7a5cff; --accent-soft: #efeaff; --warm: #ffb86b;
    --good: #30c48d; --bad: #ff6b6b; --line: #ece8de;
    --code-bg: #f5f1ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1820; --panel: #24222e; --ink: #f1eef9; --muted: #a8a4bd;
      --accent: #a48cff; --accent-soft: #2e2944; --warm: #ffc98a;
      --line: #34303f; --code-bg: #1f1d28;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    line-height: 1.55; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code { background: var(--code-bg); padding: 1px 6px; border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 0.92em; }
  pre.code { background: var(--code-bg); padding: 12px 14px; border-radius: 8px;
    overflow-x: auto; position: relative; }
  pre.code code { background: transparent; padding: 0; }
  pre.code .copy { position: absolute; top: 8px; right: 8px; font-size: 11px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 3px 8px; cursor: pointer; color: var(--muted); }
  pre.code .copy:hover { color: var(--ink); }
  blockquote { border-left: 4px solid var(--accent-soft); margin: 1em 0;
    padding: 4px 12px; color: var(--muted); }
  hr { border: 0; border-top: 1px solid var(--line); margin: 1.5em 0; }
  h1,h2,h3,h4 { line-height: 1.25; }

  .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .sidebar { background: var(--panel); border-right: 1px solid var(--line);
    padding: 18px 14px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .brand { font-weight: 700; font-size: 18px; margin-bottom: 6px; }
  .brand .emoji { font-size: 22px; margin-right: 6px; }
  .repo { font-size: 12px; color: var(--muted); margin-bottom: 12px;
    word-break: break-word; }

  .xp-wrap { background: var(--accent-soft); border-radius: 999px; height: 8px;
    overflow: hidden; margin: 10px 0 4px; }
  .xp-bar { background: var(--accent); height: 100%; width: 0%; transition: width .3s ease; }
  .xp-text { font-size: 11px; color: var(--muted); margin-bottom: 14px; }

  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav button { all: unset; cursor: pointer; padding: 8px 10px; border-radius: 8px;
    display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .nav button:hover { background: var(--accent-soft); }
  .nav button.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .nav .check { margin-left: auto; opacity: 0; transition: opacity .2s; }
  .nav button.done .check { opacity: 1; color: var(--good); }
  .nav .empty-tag { font-size: 10px; color: var(--muted); margin-left: auto; }

  .search { width: 100%; padding: 8px 10px; border: 1px solid var(--line);
    border-radius: 8px; background: var(--bg); color: var(--ink);
    font-family: inherit; font-size: 13px; margin-bottom: 12px; }

  .main { padding: 32px 48px; max-width: 920px; }
  .crumb { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .pageTitle { display: flex; align-items: center; gap: 12px; font-size: 28px;
    margin: 0 0 8px; }
  .pageTitle .icon { font-size: 32px; }
  .src-link { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
  .summary { font-size: 16px; color: var(--muted); margin-bottom: 20px; }

  .content { font-size: 15px; }
  .content h1 { font-size: 22px; margin-top: 1.4em; }
  .content h2 { font-size: 18px; margin-top: 1.4em; }
  .content h3 { font-size: 16px; margin-top: 1.2em; }
  .content ul, .content ol { padding-left: 22px; }
  .content li { margin: 4px 0; }

  .empty { padding: 18px; background: var(--accent-soft); border-radius: 10px;
    color: var(--ink); }

  table.md-table { border-collapse: collapse; width: 100%; margin: 14px 0;
    font-size: 14px; display: block; overflow-x: auto; }
  table.md-table th, table.md-table td { border: 1px solid var(--line);
    padding: 8px 12px; vertical-align: top; }
  table.md-table thead { background: var(--accent-soft); }
  table.md-table th { font-weight: 600; color: var(--ink); }
  table.md-table tbody tr:nth-child(even) { background: rgba(122,92,255,0.04); }

  /* TL;DR card at top of each section */
  .tldr { background: var(--accent-soft); border-left: 4px solid var(--accent);
    border-radius: 8px; padding: 12px 16px; margin: 0 0 22px;
    font-size: 15px; color: var(--ink); }
  .tldr .label { font-size: 11px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }

  /* Accordion sections */
  .content details { background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 4px 16px; margin: 10px 0;
    transition: box-shadow .2s; }
  .content details[open] { box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
  .content details > summary { cursor: pointer; padding: 12px 0;
    font-weight: 600; font-size: 16px; list-style: none;
    display: flex; align-items: center; gap: 10px; }
  .content details > summary::-webkit-details-marker { display: none; }
  .content details > summary::before { content: "▸"; color: var(--accent);
    transition: transform .2s; display: inline-block; }
  .content details[open] > summary::before { transform: rotate(90deg); }
  .content details > summary:hover { color: var(--accent); }
  .content details > .acc-body { padding: 0 0 12px; }

  /* Link cards (Curated Links page) */
  .link-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  @media (max-width: 720px) { .link-grid { grid-template-columns: 1fr; } }
  .link-card { background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px 16px; transition: transform .15s, box-shadow .15s; }
  .link-card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  .link-card .title { font-weight: 600; margin-bottom: 4px; display: flex;
    align-items: center; gap: 8px; }
  .link-card .desc { color: var(--muted); font-size: 13px; margin: 6px 0 8px; }
  .link-card .meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-size: 11px; background: var(--accent-soft); color: var(--accent); }
  .pill.must { background: rgba(255,184,107,0.2); color: #b07028; }
  .pill.optional { background: rgba(168,164,189,0.2); color: var(--muted); }

  .actions { display: flex; gap: 10px; margin: 28px 0 16px; flex-wrap: wrap; }
  .btn { all: unset; cursor: pointer; padding: 10px 16px; border-radius: 999px;
    background: var(--accent); color: white; font-size: 14px; font-weight: 600; }
  .btn.ghost { background: transparent; color: var(--accent);
    border: 1px solid var(--accent); }
  .btn.warm { background: var(--warm); color: #2c2a3a; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); font-size: 11px;
    font-weight: 600; margin-right: 6px; }
  .badge.good { background: rgba(48,196,141,0.15); color: var(--good); }

  .footer { font-size: 11px; color: var(--muted); margin-top: 40px;
    border-top: 1px solid var(--line); padding-top: 14px; }

  /* Quiz */
  .quiz-q { background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 16px; margin: 12px 0; }
  .quiz-q .q { font-weight: 600; margin-bottom: 10px; }
  .quiz-q .opt { display: block; padding: 8px 10px; border-radius: 6px;
    cursor: pointer; margin: 4px 0; }
  .quiz-q .opt:hover { background: var(--accent-soft); }
  .quiz-q .opt.right { background: rgba(48,196,141,0.15); color: var(--good); }
  .quiz-q .opt.wrong { background: rgba(255,107,107,0.15); color: var(--bad); }
  .quiz-score { font-size: 18px; font-weight: 700; margin-top: 18px; }

  /* Search results */
  mark { background: #fff2a8; color: #2c2a3a; padding: 0 2px; border-radius: 2px; }
  .search-hits { font-size: 12px; color: var(--muted); margin: 4px 0 0; }

  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
    .main { padding: 22px 18px; }
  }
</style>
</head>

<script type="application/json" id="buddy-data">{"meta":{"repoName":"twitter-clone","repoRoot":"/Users/brian/Desktop/twitter_clone","lastIndexedCommit":"0621978e711abb0c2544632da3a79cc8ae7e79a1","lastRunTimestamp":"2026-05-31T14:00:00.000Z","generatedAt":"2026-05-31T14:00:00.000Z","linksCount":0},"sections":[{"id":"welcome","icon":"\ud83d\udc4b","title":"Welcome","source":"README_FOR_HUMANS.md","hasContent":true,"summary":"Your home page for the twitter-clone monorepo.","html":"<h1>Welcome! \ud83d\udc4b</h1>\n<p>Hi there! I'm <strong>Buddy</strong>, your friendly guide to this repo.</p>\n<blockquote><strong>First time here?</strong> This file (and everything in <code>.buddy/</code>) is auto-generated to help you understand the project quickly.</blockquote>\n<hr/>\n<h2>What is this project?</h2>\n<p><strong>twitter-clone</strong> is a full-stack Twitter-like social media app with two parts:</p>\n<table class=\"md-table\">\n<thead><tr><th>Part</th><th>What it does</th><th>Tech</th></tr></thead>\n<tbody>\n<tr><td><strong>API</strong> (<code>api/</code>)</td><td>Backend REST API \u2014 handles users, tweets, follows, likes</td><td>Express + TypeScript + MySQL</td></tr>\n<tr><td><strong>App</strong> (<code>app/</code>)</td><td>Frontend web app \u2014 the UI you see in the browser</td><td>React 19 + Vite + TanStack</td></tr>\n</tbody>\n</table>\n<p>Together they let you:</p>\n<ul>\n<li>\u2709\ufe0f <strong>Sign up / sign in</strong> with just an email (no password!)</li>\n<li>\ud83d\udc26 <strong>Create tweets</strong> (up to 280 characters)</li>\n<li>\ud83d\udc65 <strong>Follow / unfollow</strong> other users</li>\n<li>\u2764\ufe0f <strong>Like / unlike</strong> tweets</li>\n<li>\ud83d\udcf0 <strong>View a feed</strong> of tweets from people you follow</li>\n<li>\ud83d\udc64 <strong>Browse a user directory</strong> and visit profile pages</li>\n</ul>\n<h2>Big-picture concepts</h2>\n<p>These 6 ideas will help you understand the code:</p>\n<ol>\n<li><strong>No passwords.</strong> Auth uses session tokens. Sign up with an email, get a token, send it as <code>Authorization: Bearer &lt;token&gt;</code>.</li>\n<li><strong>In-memory sessions.</strong> Tokens are in a <code>Map</code>. Server restart = everyone's logged out.</li>\n<li><strong>MySQL database.</strong> All data lives in MySQL. Raw SQL via <code>mysql2</code> \u2014 no ORM.</li>\n<li><strong>JSON responses.</strong> Every endpoint returns <code>{ \"data\": ... }</code> or <code>{ \"error\": \"...\" }</code>.</li>\n<li><strong>Monorepo.</strong> API and app live in the same repo using pnpm workspaces. Run both dev servers with one command.</li>\n<li><strong>No tests yet.</strong> Great first contribution opportunity!</li>\n</ol>\n<h2>Quick links</h2>\n<ul>\n<li>\ud83d\ude80 <strong>Just want to run it?</strong> \u2192 <a href=\"#getting\" data-tour-link=\"1\"><code>Getting Started</code></a></li>\n<li>\ud83d\uddfa\ufe0f <strong>Where does code live?</strong> \u2192 <a href=\"#map\" data-tour-link=\"1\"><code>Repo Map</code></a></li>\n<li>\ud83c\udfdb\ufe0f <strong>How is it built?</strong> \u2192 <a href=\"#architecture\" data-tour-link=\"1\"><code>Architecture</code></a></li>\n<li>\ud83e\uddf0 <strong>What tech does it use?</strong> \u2192 <a href=\"#tech\" data-tour-link=\"1\"><code>Tech Stack</code></a></li>\n<li>\ud83d\udd0c <strong>What does it talk to?</strong> \u2192 <a href=\"#integrations\" data-tour-link=\"1\"><code>Integrations</code></a></li>\n<li>\ud83d\udcc4 <strong>What changed recently?</strong> \u2192 <a href=\"#changelog\" data-tour-link=\"1\"><code>Recent Changes</code></a></li>\n<li>\u2753 <strong>Things we don't know yet</strong> \u2192 <a href=\"#questions\" data-tour-link=\"1\"><code>Open Questions</code></a></li>\n<li>\ud83d\udd17 <strong>Important external links</strong> \u2192 <a href=\"#links\" data-tour-link=\"1\"><code>Curated Links</code></a></li>\n</ul>"},{"id":"getting","icon":"\ud83d\ude80","title":"Get It Running","source":"GETTING_STARTED.md","hasContent":true,"summary":"Get the full stack (API + App) running locally in 5 minutes.","html":"<h1>Get It Running</h1>\n<h2>Prerequisites</h2>\n<ul>\n<li><strong>Node.js</strong> v18 or newer</li>\n<li><strong>pnpm</strong> \u2014 <code>npm install -g pnpm</code></li>\n<li><strong>MySQL</strong> running locally (port 3306 or socket)</li>\n</ul>\n<h2>Database setup</h2>\n<p>Create the database and tables (schema file at <code>api/src/config/sql_schema.sql</code>):</p>\n<pre class=\"code\"><code data-lang=\"bash\">mysql -u root &lt; api/src/config/sql_schema.sql</code></pre>\n<p>This creates the <code>twitter_db</code> database with these tables:</p>\n<table class=\"md-table\">\n<thead><tr><th>Table</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><code>users</code></td><td>User profiles (handle, email, name, follower count)</td></tr>\n<tr><td><code>tweets</code></td><td>Tweet text, author, likes count</td></tr>\n<tr><td><code>followers</code></td><td>Who follows whom</td></tr>\n<tr><td><code>tweet_likes</code></td><td>Who liked which tweet</td></tr>\n</tbody>\n</table>\n<p>(Optional) Load mock data:</p>\n<pre class=\"code\"><code data-lang=\"bash\">mysql -u root &lt; api/src/config/sql_mock_data.sql</code></pre>\n<h2>Install &amp; configure</h2>\n<pre class=\"code\"><code data-lang=\"bash\"># Install dependencies\npnpm install\n\n# Copy environment file (edit if needed)\ncp api/.env.example api/.env</code></pre>\n<p>Key environment variables in <code>api/.env</code>:</p>\n<table class=\"md-table\">\n<thead><tr><th>Variable</th><th>Default</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><code>PORT</code></td><td>4000</td><td>API server port</td></tr>\n<tr><td><code>DB_HOST</code></td><td>127.0.0.1</td><td>MySQL host</td></tr>\n<tr><td><code>DB_PORT</code></td><td>3306</td><td>MySQL port</td></tr>\n<tr><td><code>DB_USER</code></td><td>root</td><td>MySQL user</td></tr>\n<tr><td><code>DB_PASSWORD</code></td><td><em>(empty)</em></td><td>MySQL password</td></tr>\n<tr><td><code>DB_NAME</code></td><td>twitter_db</td><td>Database name</td></tr>\n<tr><td><code>DB_SOCKET</code></td><td>/tmp/mysql_3306.sock</td><td>Socket path</td></tr>\n</tbody>\n</table>\n<h2>Run locally (dev mode)</h2>\n<pre class=\"code\"><code data-lang=\"bash\"># Starts both API and App dev servers\npnpm dev\n\n# API only (port 4000, hot reload via tsx watch)\npnpm dev:api\n\n# App only (port 5173, Vite HMR)\npnpm dev:app</code></pre>\n<p>The Vite dev server proxies <code>/api/**</code> requests to <code>http://localhost:4000</code>, so you only need to open the app URL at <code>http://localhost:5173</code>.</p>\n<h2>Build for production</h2>\n<pre class=\"code\"><code data-lang=\"bash\">pnpm build</code></pre>\n<p>Compiles both workspaces: API \u2192 <code>api/dist/</code>, App \u2192 <code>app/dist/</code>.</p>\n<h2>Run production build</h2>\n<pre class=\"code\"><code data-lang=\"bash\">pnpm start</code></pre>\n<p>Runs <code>node api/dist/index.js</code> (API only \u2014 the frontend is served by Vite in dev).</p>\n<h2>Quick smoke test</h2>\n<pre class=\"code\"><code data-lang=\"bash\"># Sign up a user\ncurl -X POST http://localhost:4000/api/auth/signup \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"user_handle\":\"alice\",\"email_address\":\"alice@test.com\",\"first_name\":\"Alice\",\"last_name\":\"Smith\"}'\n\n# Sign in (get a session token)\ncurl -X POST http://localhost:4000/api/auth/signin \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"email_address\":\"alice@test.com\"}'\n\n# Create a tweet (replace TOKEN)\ncurl -X POST http://localhost:4000/api/tweets \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer TOKEN\" \\\n  -d '{\"tweet_text\":\"Hello from Buddy!\"}'</code></pre>\n<h2>Common problems</h2>\n<table class=\"md-table\">\n<thead><tr><th>Problem</th><th>Fix</th></tr></thead>\n<tbody>\n<tr><td><code>ECONNREFUSED</code></td><td>Start MySQL, check <code>DB_HOST</code>/<code>DB_PORT</code> in <code>api/.env</code></td></tr>\n<tr><td><code>Unknown database 'twitter_db'</code></td><td>Run <code>mysql -u root &lt; api/src/config/sql_schema.sql</code></td></tr>\n<tr><td><code>ERR_MODULE_NOT_FOUND</code></td><td>ESM project uses <code>.js</code> extensions \u2014 that's correct</td></tr>\n<tr><td>Syntax errors</td><td>Need Node.js 18+ (<code>crypto.randomUUID()</code>)</td></tr>\n</tbody>\n</table>\n<h2>Where things live</h2>\n<ul>\n<li><strong>API config:</strong> <code>api/.env</code> (gitignored) + <code>api/src/config/index.ts</code></li>\n<li><strong>Backend source:</strong> TypeScript in <code>api/src/</code></li>\n<li><strong>Frontend source:</strong> TypeScript/React in <code>app/src/</code></li>\n<li><strong>Database schema:</strong> <code>api/src/config/sql_schema.sql</code></li>\n<li><strong>Mock data:</strong> <code>api/src/config/sql_mock_data.sql</code></li>\n<li><strong>API testing:</strong> <code>.postman-collection/twitter-clone-api.postman_collection.json</code></li>\n<li><strong>Agent configs:</strong> <code>.opencode/agents/buddy.md</code></li>\n</ul>"},{"id":"tech","icon":"\ud83e\uddf0","title":"Tech Stack","source":"TECH_STACK.md","hasContent":true,"summary":"TypeScript + Express + MySQL on the backend; React + Vite + TanStack on the frontend.","html":"<h1>Tech Stack</h1>\n<p>Everything is in <strong>TypeScript</strong> targeting <strong>ES2022</strong>. Both workspaces use <strong>ESM</strong> (<code>\"type\": \"module\"</code> in package.json), so all local imports use <code>.js</code> extensions.</p>\n<h2>Backend (<code>api/</code>)</h2>\n<table class=\"md-table\">\n<thead><tr><th>Library</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><strong>Express</strong> (^4.21)</td><td>HTTP server, routing, middleware</td></tr>\n<tr><td><strong>mysql2</strong> (^3.11)</td><td>MySQL database driver (Promise API)</td></tr>\n</tbody>\n</table>\n<h2>Frontend (<code>app/</code>)</h2>\n<table class=\"md-table\">\n<thead><tr><th>Library</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><strong>React</strong> (^19.2)</td><td>UI library</td></tr>\n<tr><td><strong>Vite</strong> (^8.0)</td><td>Build tool and dev server with HMR</td></tr>\n<tr><td><strong>TanStack Router</strong> (^1.170)</td><td>File-based routing</td></tr>\n<tr><td><strong>TanStack Query</strong> (^5.100)</td><td>Server state \u2014 fetching, caching, mutations</td></tr>\n<tr><td><strong>CSS Modules</strong></td><td>Scoped component styles (<code>*.module.css</code>)</td></tr>\n</tbody>\n</table>\n<h2>Build &amp; dev tools</h2>\n<table class=\"md-table\">\n<thead><tr><th>Tool</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><strong>TypeScript (tsc)</strong></td><td>Compiles <code>.ts</code> \u2192 <code>.js</code></td></tr>\n<tr><td><strong>tsx</strong> (^4.19)</td><td>API dev server with hot reload</td></tr>\n<tr><td><strong>Vite</strong> (^8.0)</td><td>App dev server + production build</td></tr>\n<tr><td><strong>pnpm</strong></td><td>Package manager (workspaces)</td></tr>\n</tbody>\n</table>\n<h2>TypeScript config highlights</h2>\n<table class=\"md-table\">\n<thead><tr><th>Setting</th><th>Value</th><th>Why</th></tr></thead>\n<tbody>\n<tr><td><code>moduleResolution</code></td><td><code>bundler</code></td><td>Supports <code>.js</code> import extensions</td></tr>\n<tr><td><code>strict</code></td><td><code>true</code></td><td>Full type checking</td></tr>\n</tbody>\n</table>\n<h2>Tests</h2>\n<p><strong>None yet.</strong> No test files, no test framework, no test scripts defined.</p>\n<h2>CI / Deploy</h2>\n<p><strong>None yet.</strong> No CI config files found.</p>"},{"id":"architecture","icon":"\ud83c\udfdb\ufe0f","title":"Architecture","source":"ARCHITECTURE.md","hasContent":true,"summary":"Full-stack monorepo: React frontend \u2192 Express API \u2192 MySQL database.","html":"<h1>Architecture</h1>\n<p>This is a <strong>full-stack monorepo</strong> with two independent workspaces that communicate over HTTP.</p>\n<pre>\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   HTTP (port 5173 \u2192 proxy to :4000)   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502   App       \u2502 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2192 \u2502   API       \u2502\n\u2502  (React)    \u2502 \u2190\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 \u2502  (Express)  \u2502\n\u2502             \u2502          JSON responses                  \u2502             \u2502\n\u2502  Vite dev   \u2502                                         \u2502  MySQL2     \u2502\n\u2502  server     \u2502                                         \u2502  (pool)     \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518                                         \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                                               \u2502\n                                                         \u250c\u2500\u2500\u2500\u2500\u2500\u25bc\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n                                                         \u2502   MySQL    \u2502\n                                                         \u2502  Database  \u2502\n                                                         \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n</pre>\n<h2>Backend (API) \u2014 layered Express architecture</h2>\n<table class=\"md-table\">\n<thead><tr><th>Layer</th><th>Directory</th><th>Job</th></tr></thead>\n<tbody>\n<tr><td><strong>Routes</strong></td><td><code>api/src/routes/</code></td><td>Map URLs to middleware + controllers</td></tr>\n<tr><td><strong>Middleware</strong></td><td><code>api/src/middleware/</code></td><td>Auth checks, validation, error handling</td></tr>\n<tr><td><strong>Controllers</strong></td><td><code>api/src/controllers/</code></td><td>Decide what to do with a request</td></tr>\n<tr><td><strong>Models</strong></td><td><code>api/src/models/</code></td><td>SQL queries against MySQL</td></tr>\n<tr><td><strong>Validators</strong></td><td><code>api/src/validators/</code></td><td>Per-route input validation functions</td></tr>\n<tr><td><strong>Config</strong></td><td><code>api/src/config/</code></td><td>Environment config, DB pool, validation flags</td></tr>\n<tr><td><strong>Types</strong></td><td><code>api/src/types/</code></td><td>TypeScript interfaces (User, Tweet, etc.)</td></tr>\n</tbody>\n</table>\n<h2>Frontend (App) \u2014 React + TanStack</h2>\n<table class=\"md-table\">\n<thead><tr><th>Layer</th><th>Directory</th><th>Job</th></tr></thead>\n<tbody>\n<tr><td><strong>Routes</strong></td><td><code>app/src/routes/</code></td><td>Page-level components, one per URL path</td></tr>\n<tr><td><strong>Components</strong></td><td><code>app/src/components/</code></td><td>Reusable UI pieces (Feed, TweetCard, Layout)</td></tr>\n<tr><td><strong>Hooks</strong></td><td><code>app/src/hooks/</code></td><td>TanStack Query wrappers \u2014 data fetching + mutations</td></tr>\n<tr><td><strong>API client</strong></td><td><code>app/src/api/</code></td><td>HTTP client with auth header injection</td></tr>\n</tbody>\n</table>\n<h2>Full-stack flow: Creating a tweet</h2>\n<pre>\n1. User fills out tweet form in the browser\n       \u2502\n2.      \u25bc\n   [app/src/components/Feed.tsx] \u2014 calls useTweets().createTweet()\n       \u2502\n3.      \u25bc\n   [app/src/hooks/useTweets.ts] \u2014 TanStack Query mutation\n       \u2502\n4.      \u25bc\n   [app/src/api/client.ts] \u2014 POST /api/tweets with Bearer token\n       \u2502\n5.      \u25bc  (Vite proxies /api/* to localhost:4000)\n       \u2502\n6.      \u25bc\n   [authMiddleware] \u2014 reads Authorization header, sets req.userId\n       \u2502\n7.      \u25bc\n   [validationMiddleware] \u2014 checks tweet_text is present & \u2264 280 chars\n       \u2502\n8.      \u25bc\n   [tweetController.create] \u2014 calls tweetModel\n       \u2502\n9.      \u25bc\n   [tweetModel.createTweet()] \u2014 INSERT INTO tweets SQL\n       \u2502\n10.     \u25bc\n   Response: { data: { tweet_id, ... } } (status 201)\n       \u2502\n11.     \u25bc\n   TanStack Query invalidates feed cache \u2192 UI re-renders\n</pre>\n<h2>Key rules</h2>\n<ul>\n<li>Routes never do logic \u2014 just wire things up.</li>\n<li>Controllers never touch the database directly.</li>\n<li>Models never send HTTP responses.</li>\n<li>Middleware never calls models (except auth creates/destroys sessions).</li>\n<li>All endpoints return <code>{ data: ... }</code> or <code>{ error: \"...\" }</code>.</li>\n<li>Auth is purely in-memory \u2014 restart the server and everyone's logged out.</li>\n<li>Pages fetch data via hooks (TanStack Query), never directly.</li>\n<li>Auth token is stored in <code>localStorage</code> on the frontend.</li>\n</ul>"},{"id":"integrations","icon":"\ud83d\udd0c","title":"Integrations","source":"INTEGRATIONS.md","hasContent":true,"summary":"Just MySQL. No external auth, no third-party APIs.","html":"<h1>External Integrations</h1>\n<p>The project connects to exactly <strong>one</strong> external service: MySQL.</p>\n<h2>MySQL Database</h2>\n<table class=\"md-table\">\n<thead><tr><th>Detail</th><th>Value</th></tr></thead>\n<tbody>\n<tr><td>Driver</td><td><code>mysql2</code> with Promise API</td></tr>\n<tr><td>Connection</td><td>Lazy-initialized pool (first query creates it)</td></tr>\n<tr><td>Default host</td><td><code>127.0.0.1</code> or socket <code>/tmp/mysql_3306.sock</code></td></tr>\n<tr><td>Default port</td><td>3306</td></tr>\n<tr><td>Default database</td><td><code>twitter_db</code></td></tr>\n</tbody>\n</table>\n<h3>Tables</h3>\n<table class=\"md-table\">\n<thead><tr><th>Table</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><code>users</code></td><td>User profiles (handle, email, name, follower count)</td></tr>\n<tr><td><code>tweets</code></td><td>Tweet text, author, likes count</td></tr>\n<tr><td><code>followers</code></td><td>Who follows whom</td></tr>\n<tr><td><code>tweet_likes</code></td><td>Who liked which tweet</td></tr>\n</tbody>\n</table>\n<p><strong>No migration files</strong> \u2014 tables must be created manually.</p>\n<h2>Auth</h2>\n<p><strong>No external auth provider.</strong> Sessions are in-memory only:</p>\n<ul>\n<li>Tokens generated with <code>crypto.randomUUID()</code></li>\n<li>Stored in a <code>Map&lt;string, number&gt;</code> in <code>api/src/middleware/auth.ts</code></li>\n<li>No JWT, no OAuth, no bcrypt, no database persistence</li>\n<li>Restart the server = all sessions are lost</li>\n</ul>\n<h2>Configuration</h2>\n<p>All configuration comes from environment variables in <code>.env</code> (gitignored). See <code>.env.example</code> for the template.</p>\n<table class=\"md-table\">\n<thead><tr><th>Variable</th><th>Type</th><th>Secret?</th></tr></thead>\n<tbody>\n<tr><td><code>PORT</code></td><td>number</td><td>No</td></tr>\n<tr><td><code>DB_HOST</code></td><td>string</td><td>No</td></tr>\n<tr><td><code>DB_PORT</code></td><td>number</td><td>No</td></tr>\n<tr><td><code>DB_USER</code></td><td>string</td><td>Maybe</td></tr>\n<tr><td><code>DB_PASSWORD</code></td><td>string</td><td><strong>Yes</strong></td></tr>\n<tr><td><code>DB_NAME</code></td><td>string</td><td>No</td></tr>\n<tr><td><code>DB_SOCKET</code></td><td>string</td><td>No</td></tr>\n</tbody>\n</table>"},{"id":"map","icon":"\ud83d\uddfa\ufe0f","title":"Repo Map","source":"MAP/repo_map.md","hasContent":true,"summary":"A folder-by-folder tour of the codebase.","html":"<h1>Repo Map</h1>\n<p>A folder-by-folder tour of where things live. Code is split between two workspaces: <code>api/</code> and <code>app/</code>.</p>\n<h2>Top-level files</h2>\n<table class=\"md-table\">\n<thead><tr><th>File</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><code>package.json</code></td><td>Root monorepo config \u2014 orchestrates api/ and app/ workspaces</td></tr>\n<tr><td><code>pnpm-workspace.yaml</code></td><td>pnpm workspace definition (lists api/ and app/)</td></tr>\n<tr><td><code>AGENTS.md</code></td><td>Quick-reference for AI agents &amp; contributors</td></tr>\n<tr><td><code>README.md</code></td><td>Project README with setup and API reference</td></tr>\n</tbody>\n</table>\n<h2>Top-level folders</h2>\n<table class=\"md-table\">\n<thead><tr><th>Folder</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><code>api/</code></td><td><strong>Backend \u2014 Express REST API</strong> (all server code)</td></tr>\n<tr><td><code>app/</code></td><td><strong>Frontend \u2014 React web app</strong> (all client code)</td></tr>\n<tr><td><code>.buddy/</code></td><td>AI agent knowledge base</td></tr>\n<tr><td><code>.opencode/</code></td><td>Opencode AI agent config</td></tr>\n<tr><td><code>.postman-collection/</code></td><td>Postman API collection</td></tr>\n</tbody>\n</table>\n<h2>Inside <code>api/</code> \u2014 the backend</h2>\n<table class=\"md-table\">\n<thead><tr><th>Subfolder</th><th>Purpose</th><th>Key files</th></tr></thead>\n<tbody>\n<tr><td><code>src/routes/</code></td><td>API endpoint definitions</td><td><code>authRoutes.ts</code>, <code>tweetRoutes.ts</code>, <code>userRoutes.ts</code>, <code>followRoutes.ts</code></td></tr>\n<tr><td><code>src/controllers/</code></td><td>Request handling &amp; business logic</td><td><code>authController.ts</code>, <code>tweetController.ts</code>, <code>userController.ts</code>, <code>followController.ts</code>, <code>likeController.ts</code></td></tr>\n<tr><td><code>src/models/</code></td><td>SQL queries (database layer)</td><td><code>userModel.ts</code>, <code>tweetModel.ts</code>, <code>followModel.ts</code>, <code>likeModel.ts</code></td></tr>\n<tr><td><code>src/middleware/</code></td><td>Auth, validation, error handling</td><td><code>auth.ts</code>, <code>validation.ts</code>, <code>errorHandler.ts</code></td></tr>\n<tr><td><code>src/validators/</code></td><td>Input validation functions</td><td><code>authValidator.ts</code>, <code>tweetValidator.ts</code>, <code>helpers.ts</code></td></tr>\n<tr><td><code>src/config/</code></td><td>App config, DB pool, validation flags, schema + mock data</td><td><code>index.ts</code>, <code>sql_schema.sql</code>, <code>sql_mock_data.sql</code></td></tr>\n<tr><td><code>src/types/</code></td><td>TypeScript interfaces</td><td><code>index.ts</code></td></tr>\n<tr><td><code>src/app.ts</code></td><td>Express app setup (routes, middleware)</td><td>Entry point for the app</td></tr>\n<tr><td><code>src/index.ts</code></td><td>Server startup (listens on PORT)</td><td>Entry point for the server</td></tr>\n</tbody>\n</table>\n<h2>Inside <code>app/</code> \u2014 the frontend</h2>\n<table class=\"md-table\">\n<thead><tr><th>Subfolder</th><th>Purpose</th><th>Key files</th></tr></thead>\n<tbody>\n<tr><td><code>src/routes/</code></td><td>TanStack Router \u2014 page components per URL path</td><td><code>index.tsx</code> (feed), <code>signin.tsx</code>, <code>signup.tsx</code>, <code>users.$id.tsx</code> (profile), <code>users.index.tsx</code> (directory)</td></tr>\n<tr><td><code>src/components/</code></td><td>Reusable UI components</td><td><code>Feed.tsx</code>, <code>TweetCard.tsx</code>, <code>Layout.tsx</code></td></tr>\n<tr><td><code>src/hooks/</code></td><td>Custom React hooks (TanStack Query wrappers)</td><td><code>useAuth.ts</code>, <code>useFeed.ts</code>, <code>useTweets.ts</code>, <code>useUsers.ts</code></td></tr>\n<tr><td><code>src/api/</code></td><td>HTTP client and TypeScript types</td><td><code>client.ts</code>, <code>types.ts</code></td></tr>\n<tr><td><code>src/App.tsx</code></td><td>Root component \u2014 sets up Router + QueryClient</td><td></td></tr>\n<tr><td><code>src/main.tsx</code></td><td>React entry point \u2014 mounts &lt;App /&gt; to the DOM</td><td></td></tr>\n</tbody>\n</table>\n<h2>Where to start reading</h2>\n<h3>Backend (API)</h3>\n<ol>\n<li><strong><code>api/src/app.ts</code></strong> \u2014 See all routes wired up at a glance.</li>\n<li><strong><code>api/src/routes/authRoutes.ts</code></strong> \u2014 Follow a simple signup flow.</li>\n<li><strong><code>api/src/controllers/authController.ts</code></strong> \u2014 See how controllers work.</li>\n<li><strong><code>api/src/models/userModel.ts</code></strong> \u2014 See how database queries work.</li>\n<li><strong><code>api/src/middleware/auth.ts</code></strong> \u2014 Understand the auth system.</li>\n</ol>\n<h3>Frontend (App)</h3>\n<ol>\n<li><strong><code>app/src/App.tsx</code></strong> \u2014 See how the app is wired together.</li>\n<li><strong><code>app/src/routes/index.tsx</code></strong> \u2014 The feed page (main view).</li>\n<li><strong><code>app/src/hooks/useAuth.ts</code></strong> \u2014 See how auth works on the client.</li>\n<li><strong><code>app/src/api/client.ts</code></strong> \u2014 See how the app talks to the API.</li>\n<li><strong><code>app/src/components/Feed.tsx</code></strong> \u2014 A key UI component.</li>\n</ol>"},{"id":"entry","icon":"\ud83d\udeaa","title":"Entry Points","source":"MAP/entry_points.md","hasContent":true,"summary":"API dev server, App dev server, production server \u2014 separate entry points for each workspace.","html":"<h1>Entry Points</h1>\n<p>Where execution starts \u2014 three ways to run the API, and the frontend entry:</p>\n<table class=\"md-table\">\n<thead><tr><th>Entry</th><th>Command</th><th>File</th><th>What it does</th></tr></thead>\n<tbody>\n<tr><td><strong>API dev server</strong></td><td><code>pnpm dev:api</code></td><td><code>api/src/index.ts</code></td><td>Starts Express with hot reload via <code>tsx watch</code></td></tr>\n<tr><td><strong>App dev server</strong></td><td><code>pnpm dev:app</code></td><td><code>app/src/main.tsx</code></td><td>Starts Vite with HMR (port 5173)</td></tr>\n<tr><td><strong>Both dev servers</strong></td><td><code>pnpm dev</code></td><td>\u2014</td><td>Concurrently starts API + App</td></tr>\n<tr><td><strong>Production server</strong></td><td><code>pnpm start</code></td><td><code>api/dist/index.js</code></td><td>Runs compiled API (after <code>pnpm build</code>)</td></tr>\n<tr><td><strong>Build all</strong></td><td><code>pnpm build</code></td><td>\u2014</td><td>Compiles API (tsc) + builds App (Vite)</td></tr>\n</tbody>\n</table>"},{"id":"flow","icon":"\ud83d\udd01","title":"Data Flow","source":"MAP/data_flow.md","hasContent":true,"summary":"Request \u2192 Auth \u2192 Validate \u2192 Controller \u2192 Model \u2192 SQL \u2192 Response.","html":"<h1>Data Flow</h1>\n<p>Here's how each API call flows through the system.</p>\n<h2>Sign up</h2>\n<pre>Client \u2192 POST /api/auth/signup\n  \u2192 validationMiddleware (checks handle, email, name)\n  \u2192 authController.signup\n    \u2192 userModel.findUserByEmail (check duplicate email)\n    \u2192 userModel.findUserByHandle (check duplicate handle)\n    \u2192 userModel.createUser (INSERT INTO users)\n    \u2192 createSession (stores token in Map)\n  \u2190 201: { data: { session_token, user } }</pre>\n<h2>Sign in</h2>\n<pre>Client \u2192 POST /api/auth/signin\n  \u2192 validationMiddleware (checks email)\n  \u2192 authController.signin\n    \u2192 userModel.findUserByEmail (look up user)\n    \u2192 createSession (stores token in Map)\n  \u2190 { data: { session_token, user } }</pre>\n<h2>Create tweet</h2>\n<pre>Client \u2192 POST /api/tweets (Authorization: Bearer &lt;token&gt;)\n  \u2192 authMiddleware (validates token, sets req.userId)\n  \u2192 validationMiddleware (tweet_text \u2264 280 chars)\n  \u2192 tweetController.create\n    \u2192 tweetModel.createTweet (INSERT INTO tweets)\n  \u2190 201: { data: { tweet_id, tweet_text, ... } }</pre>\n<h2>Get feed</h2>\n<pre>Client \u2192 GET /api/feed?limit=20&amp;offset=0\n  \u2192 authMiddleware\n  \u2192 feed controller\n    \u2192 tweetModel.getFeedForUser (SELECT from followed users)\n  \u2190 { data: [tweet, ...] }</pre>\n<h2>Follow a user</h2>\n<pre>Client \u2192 POST /api/followers (body: { following_id })\n  \u2192 authMiddleware\n  \u2192 validationMiddleware\n  \u2192 followController.follow\n    \u2192 userModel.findUserById (check target exists)\n    \u2192 followModel.isFollowing (check not already)\n    \u2192 followModel.followUser (INSERT INTO followers)\n    \u2192 userModel.updateFollowerCount (increment)\n  \u2190 201: { data: { message: \"Now following user\" } }</pre>\n<h2>Like a tweet</h2>\n<pre>Client \u2192 POST /api/tweets/:id/like\n  \u2192 authMiddleware\n  \u2192 validateParam('id') (must be positive integer)\n  \u2192 likeController.like\n    \u2192 tweetModel.findTweetById (check exists)\n    \u2192 likeModel.hasLiked (check not already)\n    \u2192 likeModel.likeTweet (INSERT INTO tweet_likes)\n    \u2192 tweetModel.updateLikesCount (increment)\n  \u2190 201: { data: { message: \"Tweet liked\" } }</pre>"},{"id":"changelog","icon":"\ud83d\udcdc","title":"Recent Changes","source":"CHANGELOG_SUMMARY.md","hasContent":true,"summary":"Initial project setup + monorepo restructure with api/ and app/ workspaces.","html":"<h1>Recent Changes</h1>\n<p>Recent commits (most recent first):</p>\n<ul>\n<li><strong><code>7d574c5</code></strong> \u2014 <em>doc: update buddy knowledge base for monorepo restructure</em></li>\n<li><strong><code>0621978</code></strong> \u2014 <em>feat: restructure into monorepo with api/ and app/</em><br/>\nSplit the flat repo into pnpm workspaces: <code>api/</code> (Express backend) and <code>app/</code> (React frontend with Vite + TanStack).</li>\n<li><strong><code>ee8aa21</code></strong> \u2014 <em>doc: update buddy knowledge base after 9 new commits</em></li>\n<li><strong><code>69e6209</code></strong> \u2014 <em>docs: add database setup and getAllUsers to README</em></li>\n<li><strong><code>cd0428f</code></strong> \u2014 <em>feat: add mock data SQL file</em></li>\n<li><strong><code>c080a5f</code></strong> \u2014 <em>chore: reorder imports in authController</em></li>\n<li><strong><code>53a747c</code></strong> \u2014 <em>feat: initial project setup</em><br/>\nExpress + TypeScript + MySQL2 skeleton with all routes, controllers, models, middleware, validators, and in-memory session auth.</li>\n</ul>\n<h2>What's missing (good first issues!)</h2>\n<ul>\n<li>\u274c No test files or test framework</li>\n<li>\u274c No lint/format scripts (ESLint, Prettier)</li>\n<li>\u274c No CI pipeline (GitHub Actions)</li>\n<li>\u274c No database migration files</li>\n</ul>"},{"id":"starter","icon":"\ud83c\udfaf","title":"Starter Tasks","source":"STARTER_TASKS.md","hasContent":true,"summary":"Tiny first things to try \u2014 pick one and ship it.","html":"<h1>Starter Tasks</h1>\n<p>Friendly first things to try in this repo. Pick <strong>one</strong> and ship it \u2014 small wins beat big plans.</p>\n<h2>Warm-up (\u2248 15 min)</h2>\n<ul>\n<li>Run the project locally following <code>GETTING_STARTED.md</code> end-to-end. Note any step that wasn't obvious.</li>\n<li>Find one typo or unclear sentence in a <code>.buddy/</code> doc and open a tiny PR fixing it.</li>\n</ul>\n<h2>First real change (\u2248 1\u20132 hrs)</h2>\n<ul>\n<li><strong>Add a test.</strong> There are zero tests. Pick a model function and write a basic test.</li>\n<li><strong>Improve an error message.</strong> Find one that confused you and make it clearer.</li>\n<li><strong>Add validation.</strong> Some routes have validation toggled off via <code>validationFlags</code> in <code>api/src/config/index.ts</code> \u2014 turn one on.</li>\n</ul>\n<h2>Learn by doing</h2>\n<ul>\n<li>Trace a single request from entry point \u2192 handler \u2192 response. Add a comment explaining what you found.</li>\n<li>Read <code>api/src/middleware/auth.ts</code> \u2014 it's only ~40 lines and explains the whole auth system.</li>\n<li>Read <code>api/src/config/index.ts</code> \u2014 see how DB pool and validation flags work.</li>\n</ul>\n<h2>Tips</h2>\n<ul>\n<li><strong>Ask early.</strong> If a task takes &gt;30 min just to understand, share that feedback.</li>\n<li><strong>Tiny PRs win.</strong> A one-line fix you ship today beats a refactor you ship next month.</li>\n<li><strong>Update Buddy.</strong> When you learn something, add it to the matching <code>.buddy/*.md</code> doc.</li>\n</ul>"},{"id":"questions","icon":"\u2753","title":"Open Questions","source":"NOTES/open_questions.md","hasContent":true,"summary":"Things Buddy couldn't figure out from the code alone.","html":"<h1>Open Questions</h1>\n<p>Things Buddy couldn't figure out from the repo alone. Help answer these!</p>\n<h2>Database schema</h2>\n<ul>\n<li>What does the full <code>users</code> table schema look like? Columns are inferred from types and queries but the actual <code>CREATE TABLE</code> statement isn't in the repo.</li>\n<li>Are there any indexes beyond primary keys?</li>\n<li>Are there <code>ON DELETE CASCADE</code> foreign keys?</li>\n</ul>\n<h2>Missing pieces</h2>\n<ul>\n<li>What test framework would be preferred? (None is set up yet.)</li>\n<li>Is there a planned CI pipeline? (<code>.github/</code> has <code>agents/buddy.md</code> \u2014 no CI workflows.)</li>\n<li>Are there lint/formatting conventions? (ESLint? Prettier?)</li>\n<li>Should database migration files be created, or is manual SQL intentional?</li>\n</ul>\n<h2>Assumptions Buddy made</h2>\n<ul>\n<li>The MySQL socket path <code>/tmp/mysql_3306.sock</code> works on this machine (can use TCP via <code>DB_HOST</code>/<code>DB_PORT</code> if not).</li>\n<li>Database tables must be created manually \u2014 no migration files exist.</li>\n<li>Column names in <code>api/src/types/index.ts</code> match actual database columns.</li>\n<li><code>pnpm</code> is the package manager (from <code>package.json</code> + lockfile).</li>\n<li>This is a learning project / toy API, not meant for production (in-memory auth, no tests, no CI).</li>\n</ul>"},{"id":"links","icon":"\ud83d\udd17","title":"Curated Links","source":"LINKS.md","hasContent":true,"summary":"No external links saved yet. Add some with 'buddy link'.","html":"<h1>Curated Links</h1>\n<p>Important external docs, references, and resources for this project.</p>\n<blockquote>\u26a0\ufe0f Buddy never reads linked pages. It only stores metadata. If you want a summary, paste the contents into chat.</blockquote>\n<p>Add a link from the terminal:</p>\n<pre class=\"code\"><code data-lang=\"bash\">buddy link https://example.com/doc --title \"MySQL reference\" --tags database --relevance must-read</code></pre>\n<p>Or ask Buddy: <em>\"here's a link: https://\u2026 it's our MySQL setup guide.\"</em></p>\n<h2>Must-read</h2>\n<p><em>(none yet \u2014 add one with <code>buddy link</code>)</em></p>\n<h2>Helpful</h2>\n<p><em>(none yet)</em></p>\n<h2>Optional</h2>\n<p><em>(none yet)</em></p>"}],"quiz":[{"q":"What kind of auth does twitter-clone use?","choices":["JWT tokens stored in the database","In-memory session tokens with crypto.randomUUID()","OAuth 2.0 with GitHub","API keys in the .env file"],"answer":1},{"q":"What file extension must local imports use in this ESM project?","choices":[".ts",".js",".mjs","No extension needed"],"answer":1},{"q":"What happens to all user sessions when the server restarts?","choices":["They're persisted to the MySQL database","They're saved to disk","They're lost \u2014 the session Map is in memory","They're backed by Redis"],"answer":2},{"q":"What is the maximum tweet length?","choices":["140 characters","280 characters","300 characters","No limit"],"answer":1},{"q":"Which folder contains all the SQL database queries?","choices":["api/src/routes/","api/src/controllers/","api/src/models/","api/src/middleware/"],"answer":2},{"q":"What default MySQL socket path does the project use?","choices":["/var/run/mysqld/mysqld.sock","/tmp/mysql.sock","/tmp/mysql_3306.sock","/opt/homebrew/var/mysql/mysql.sock"],"answer":2},{"q":"What response format does every API endpoint use?","choices":["{ data: ... } on success, { error: \"...\" } on failure","Just the raw data as JSON","XML","Plain text"],"answer":0},{"q":"What command starts the dev server with hot reload?","choices":["npm start","pnpm dev","pnpm build","node api/dist/index.js"],"answer":1}],"links":[]}</script>
<script>
(function(){
  const raw = document.getElementById('buddy-data').textContent;
  const DATA = JSON.parse(raw);
  const STORAGE_KEY = 'buddy-tour:' + (DATA.meta.repoName || 'repo');
  const state = loadState();

  function loadState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { done: {}, quiz: null }; }
    catch { return { done: {}, quiz: null }; }
  }
  function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {} }

  const ALL_STEPS = DATA.sections.concat([
    { id: '__quiz__', icon: '🎓', title: 'Graduation Quiz', isQuiz: true, hasContent: true },
  ]);

  document.getElementById('repoName').textContent = '📦 ' + (DATA.meta.repoName || 'repo');

  const nav = document.getElementById('nav');
  ALL_STEPS.forEach((s, idx) => {
    const b = document.createElement('button');
    b.dataset.id = s.id;
    b.innerHTML = '<span>' + s.icon + '</span><span>' + (idx + 1) + '. ' + escapeHtml(s.title) + '</span>'
      + (s.hasContent ? '' : '<span class="empty-tag">empty</span>')
      + '<span class="check">✓</span>';
    b.onclick = () => navigate(s.id);
    nav.appendChild(b);
  });

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  function refreshNav() {
    const total = ALL_STEPS.length;
    let done = 0;
    Array.from(nav.children).forEach((btn) => {
      const id = btn.dataset.id;
      if (state.done[id]) { btn.classList.add('done'); done++; }
      else btn.classList.remove('done');
      btn.classList.toggle('active', id === currentId);
    });
    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('xpBar').style.width = pct + '%';
    document.getElementById('xpText').textContent =
      done + ' / ' + total + ' steps complete  •  ' + pct + ' XP';
  }

  let currentId = ALL_STEPS[0].id;
  function navigate(id) {
    currentId = id;
    if (id === '__quiz__') renderQuiz();
    else renderSection(DATA.sections.find((x) => x.id === id));
    refreshNav();
    history.replaceState(null, '', '#' + id);
  }

  function markDone(id) { state.done[id] = true; saveState(); refreshNav(); }

  function renderSection(s) {
    const idx = ALL_STEPS.findIndex((x) => x.id === s.id);
    const next = ALL_STEPS[idx + 1];
    const main = document.getElementById('main');

    // Special, more visual rendering for the Curated Links page.
    let body;
    if (s.id === 'links' && Array.isArray(DATA.links) && DATA.links.length) {
      body = renderLinksGrid(DATA.links);
    } else if (s.hasContent) {
      body = '<div class="content">' + s.html + '</div>';
    } else {
      body = '<div class="empty"><strong>This section is empty.</strong> Ask Buddy in your CLI: '
           + '<code>"Scan this repo and fill in .buddy/' + escapeHtml(s.source) + '"</code>.</div>';
    }

    main.innerHTML =
      '<div class="crumb">Step ' + (idx + 1) + ' of ' + ALL_STEPS.length + '</div>'
      + '<h1 class="pageTitle"><span class="icon">' + s.icon + '</span>'
      + escapeHtml(s.title) + '</h1>'
      + (s.summary ? '<div class="tldr"><div class="label">In one line</div>' + escapeHtml(s.summary) + '</div>' : '')
      + '<div class="src-link">📖 Source: <code>.buddy/' + escapeHtml(s.source) + '</code></div>'
      + body
      + '<div class="actions">'
      + '<button class="btn" id="btnDone">' + (state.done[s.id] ? '✓ Marked complete' : 'Mark complete & continue') + '</button>'
      + (next ? '<button class="btn ghost" id="btnNext">Next: ' + escapeHtml(next.title) + ' →</button>' : '')
      + '</div>'
      + '<div class="footer">Generated ' + new Date(DATA.meta.generatedAt).toLocaleString()
      + (DATA.meta.lastIndexedCommit ? ' • Indexed commit ' + DATA.meta.lastIndexedCommit.slice(0,8) : '')
      + '</div>';

    document.getElementById('btnDone').onclick = function(){
      markDone(s.id);
      if (next) navigate(next.id);
    };
    if (next) document.getElementById('btnNext').onclick = function(){
      markDone(s.id); navigate(next.id);
    };
    accordionizeContent(main);
    addCopyButtons(main);
    wireInternalLinks(main);
  }

  // Track scroll listener cleanup so navigating between sidebar sections
  // doesn't leave stale handlers attached to detached DOM.
  let scrollCleanup = null;

  function renderLinksGrid(links) {
    const cards = links.map((l) => {
      const tagPills = (l.tags || []).map((t) =>
        '<span class="pill">' + escapeHtml(t) + '</span>').join('');
      const relPill = '<span class="pill ' + (l.relevance === 'must-read' ? 'must' :
        l.relevance === 'optional' ? 'optional' : '') + '">'
        + escapeHtml(l.relevance || 'helpful') + '</span>';
      const safeUrl = /^(https?:|mailto:)/i.test(l.url || '') ? l.url : '#';
      return '<a class="link-card" href="' + escapeHtml(safeUrl) + '" target="_blank" rel="noopener">'
        + '<div class="title">🔗 ' + escapeHtml(l.title) + '</div>'
        + (l.description ? '<div class="desc">' + escapeHtml(l.description) + '</div>' : '')
        + '<div class="meta">' + relPill + tagPills + '</div>'
        + '</a>';
    }).join('');
    return '<div class="link-grid">' + cards + '</div>';
  }

  // Wrap H2 sections of rendered markdown into <details> accordions.
  // First accordion is open by default so the page never looks empty.
  function accordionizeContent(root) {
    const content = root.querySelector('.content');
    if (!content) return;
    const children = Array.from(content.children);
    if (children.filter((c) => c.tagName === 'H2').length < 2) return;
    // Unique group name so opening one card auto-closes its siblings
    // (native exclusive-accordion behavior in modern browsers).
    const groupName = 'acc-' + Math.random().toString(36).slice(2, 9);
    const frag = document.createDocumentFragment();
    const detailsList = [];
    let bucket = null;
    let firstOpen = true;
    for (const el of children) {
      if (el.tagName === 'H2') {
        const det = document.createElement('details');
        det.name = groupName;
        if (firstOpen) { det.open = true; firstOpen = false; }
        const sum = document.createElement('summary');
        sum.innerHTML = el.innerHTML;
        const accBody = document.createElement('div');
        accBody.className = 'acc-body';
        det.appendChild(sum);
        det.appendChild(accBody);
        frag.appendChild(det);
        detailsList.push(det);
        bucket = accBody;
      } else if (bucket) {
        bucket.appendChild(el);
      } else {
        frag.appendChild(el);
      }
    }
    content.innerHTML = '';
    content.appendChild(frag);
    // Fallback for browsers without exclusive <details name=...> support.
    detailsList.forEach((d) => {
      d.addEventListener('toggle', () => {
        if (!d.open) return;
        detailsList.forEach((o) => { if (o !== d && o.open) o.open = false; });
      });
    });
    // Auto-open the section the user scrolls to. Driven by real scroll
    // events (not IntersectionObserver), so layout shifts caused by
    // opening a card do not re-trigger and fight the user's clicks.
    if (scrollCleanup) { scrollCleanup(); scrollCleanup = null; }
    let userClickLock = 0;
    let lastAdvanceAt = 0;
    let wheelAccum = 0;
    detailsList.forEach((d) => {
      const sum = d.querySelector('summary');
      if (sum) {
        sum.addEventListener('click', () => {
          // Briefly ignore scroll-driven auto-open after a manual click,
          // so the user's choice sticks even if the page reflows.
          userClickLock = Date.now() + 800;
          wheelAccum = 0;
        });
      }
    });
    function handoff(dir) {
      const now = Date.now();
      if (now < userClickLock) return;
      if (now - lastAdvanceAt < 250) return;
      const openIdx = detailsList.findIndex((d) => d.open);
      if (openIdx === -1) { detailsList[0].open = true; return; }
      if (dir > 0) {
        const next = detailsList[openIdx + 1];
        if (next) { next.open = true; lastAdvanceAt = now; }
      } else if (dir < 0) {
        const prev = detailsList[openIdx - 1];
        if (prev) { prev.open = true; lastAdvanceAt = now; }
      }
    }
    function onWheel(e) {
      // Wheel events fire even when the page is not scrollable, so this is
      // the most reliable signal. Accumulate deltaY and hand off when it
      // crosses a threshold — this also debounces trackpad inertia.
      wheelAccum += e.deltaY;
      if (Math.abs(wheelAccum) >= 80) {
        const dir = wheelAccum > 0 ? 1 : -1;
        wheelAccum = 0;
        handoff(dir);
      }
    }
    function onKey(e) {
      if (['ArrowDown','PageDown','End',' '].includes(e.key)) handoff(1);
      else if (['ArrowUp','PageUp','Home'].includes(e.key)) handoff(-1);
    }
    // Also keep a scroll-based path: on scrollable pages, when the open
    // card's body scrolls out of view, advance. This complements wheel
    // accumulation for users who scroll via scrollbar / middle-click.
    let prevScrollY = window.scrollY;
    function onScroll() {
      const y = window.scrollY;
      const dy = y - prevScrollY;
      prevScrollY = y;
      if (Date.now() < userClickLock) return;
      if (Date.now() - lastAdvanceAt < 250) return;
      const openIdx = detailsList.findIndex((d) => d.open);
      if (openIdx === -1) return;
      const open = detailsList[openIdx];
      const r = open.getBoundingClientRect();
      const vh = window.innerHeight;
      if (dy > 0) {
        const next = detailsList[openIdx + 1];
        if (next && r.bottom < vh * 0.35) handoff(1);
      } else if (dy < 0) {
        const prev = detailsList[openIdx - 1];
        if (prev && r.top > vh * 0.55) handoff(-1);
      }
    }
    const targets = [window, document, document.documentElement, document.body];
    targets.forEach((t) => t.addEventListener('scroll', onScroll, { passive: true }));
    window.addEventListener('wheel', onWheel, { passive: true });
    window.addEventListener('keydown', onKey);
    scrollCleanup = () => {
      targets.forEach((t) => t.removeEventListener('scroll', onScroll));
      window.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', onKey);
    };
  }

  function wireInternalLinks(root) {
    root.querySelectorAll('a[data-tour-link="1"]').forEach((a) => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const id = (a.getAttribute('href') || '').replace('#', '');
        if (id) navigate(id);
      });
    });
  }

  function addCopyButtons(root) {
    root.querySelectorAll('pre.code').forEach((pre) => {
      if (pre.querySelector('.copy')) return;
      const btn = document.createElement('button');
      btn.className = 'copy';
      btn.textContent = 'Copy';
      btn.onclick = () => {
        const txt = pre.querySelector('code').innerText;
        navigator.clipboard?.writeText(txt);
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
      };
      pre.appendChild(btn);
    });
  }

  function renderQuiz() {
    const main = document.getElementById('main');
    state.quiz = state.quiz || { answers: {} };
    let html = '<div class="crumb">Final step</div>'
      + '<h1 class="pageTitle"><span class="icon">🎓</span>Graduation Quiz</h1>'
      + '<div class="summary">Answer a few quick questions to earn your Buddy Graduate badge.</div>';
    DATA.quiz.forEach((q, qi) => {
      html += '<div class="quiz-q" data-qi="' + qi + '"><div class="q">'
        + (qi + 1) + '. ' + escapeHtml(q.q) + '</div>';
      q.choices.forEach((c, ci) => {
        html += '<button class="opt" data-ci="' + ci + '">' + escapeHtml(c) + '</button>';
      });
      html += '</div>';
    });
    html += '<div class="quiz-score" id="score"></div>';
    html += '<div class="actions"><button class="btn warm" id="btnFinish">Finish & earn badge 🎉</button></div>';
    main.innerHTML = html;

    main.querySelectorAll('.quiz-q').forEach((qEl) => {
      const qi = +qEl.dataset.qi;
      qEl.querySelectorAll('.opt').forEach((opt) => {
        opt.onclick = () => {
          const ci = +opt.dataset.ci;
          state.quiz.answers[qi] = ci;
          saveState();
          qEl.querySelectorAll('.opt').forEach((o) => o.classList.remove('right','wrong'));
          opt.classList.add(ci === DATA.quiz[qi].answer ? 'right' : 'wrong');
          if (ci !== DATA.quiz[qi].answer) {
            const correct = qEl.querySelectorAll('.opt')[DATA.quiz[qi].answer];
            if (correct) correct.classList.add('right');
          }
          updateScore();
        };
        // Restore prior selection
        if (state.quiz.answers[qi] === +opt.dataset.ci) opt.click();
      });
    });
    function updateScore() {
      let correct = 0;
      DATA.quiz.forEach((q, i) => { if (state.quiz.answers[i] === q.answer) correct++; });
      document.getElementById('score').textContent =
        'Score: ' + correct + ' / ' + DATA.quiz.length
        + (correct === DATA.quiz.length ? '  🌟 Perfect!' : '');
    }
    updateScore();
    document.getElementById('btnFinish').onclick = () => {
      markDone('__quiz__');
      alert('🎉 You finished the Buddy Tour!\nYou are ready to ship your first contribution.');
    };
  }

  // Search across all sections.
  document.getElementById('search').addEventListener('input', (e) => {
    const term = e.target.value.trim().toLowerCase();
    if (!term) { navigate(currentId); return; }
    const main = document.getElementById('main');
    const hits = [];
    DATA.sections.forEach((s) => {
      const txt = (s.title + ' ' + s.summary + ' ' + s.html).toLowerCase();
      if (txt.includes(term)) hits.push(s);
    });
    main.innerHTML = '<h1 class="pageTitle"><span class="icon">🔎</span>Search: ' + escapeHtml(term) + '</h1>'
      + '<div class="search-hits">' + hits.length + ' section(s) match.</div>'
      + hits.map((s) => '<div class="quiz-q" style="cursor:pointer" data-id="' + s.id + '">'
        + '<div class="q">' + s.icon + ' ' + escapeHtml(s.title) + '</div>'
        + '<div style="color:var(--muted);font-size:13px">' + escapeHtml(s.summary || '(open to view)') + '</div></div>').join('');
    main.querySelectorAll('[data-id]').forEach((el) => {
      el.onclick = () => { document.getElementById('search').value = ''; navigate(el.dataset.id); };
    });
  });

  // Start: honor URL hash if present.
  const hash = (location.hash || '').replace('#','');
  const start = ALL_STEPS.find((s) => s.id === hash) ? hash : ALL_STEPS[0].id;
  navigate(start);
})();
</script>
</body>
</html>
