<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Buddy Tour</title>
<style>
  :root {
    --bg: #fdfbf7; --panel: #ffffff; --ink: #2c2a3a; --muted: #6b6880;
    --accent: #7a5cff; --accent-soft: #efeaff; --warm: #ffb86b;
    --good: #30c48d; --bad: #ff6b6b; --line: #ece8de;
    --code-bg: #f5f1ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1820; --panel: #24222e; --ink: #f1eef9; --muted: #a8a4bd;
      --accent: #a48cff; --accent-soft: #2e2944; --warm: #ffc98a;
      --line: #34303f; --code-bg: #1f1d28;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    line-height: 1.55; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code { background: var(--code-bg); padding: 1px 6px; border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 0.92em; }
  pre.code { background: var(--code-bg); padding: 12px 14px; border-radius: 8px;
    overflow-x: auto; position: relative; }
  pre.code code { background: transparent; padding: 0; }
  pre.code .copy { position: absolute; top: 8px; right: 8px; font-size: 11px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 3px 8px; cursor: pointer; color: var(--muted); }
  pre.code .copy:hover { color: var(--ink); }
  blockquote { border-left: 4px solid var(--accent-soft); margin: 1em 0;
    padding: 4px 12px; color: var(--muted); }
  hr { border: 0; border-top: 1px solid var(--line); margin: 1.5em 0; }
  h1,h2,h3,h4 { line-height: 1.25; }

  .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .sidebar { background: var(--panel); border-right: 1px solid var(--line);
    padding: 18px 14px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .brand { font-weight: 700; font-size: 18px; margin-bottom: 6px; }
  .brand .emoji { font-size: 22px; margin-right: 6px; }
  .repo { font-size: 12px; color: var(--muted); margin-bottom: 12px;
    word-break: break-word; }

  .xp-wrap { background: var(--accent-soft); border-radius: 999px; height: 8px;
    overflow: hidden; margin: 10px 0 4px; }
  .xp-bar { background: var(--accent); height: 100%; width: 0%; transition: width .3s ease; }
  .xp-text { font-size: 11px; color: var(--muted); margin-bottom: 14px; }

  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav button { all: unset; cursor: pointer; padding: 8px 10px; border-radius: 8px;
    display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .nav button:hover { background: var(--accent-soft); }
  .nav button.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .nav .check { margin-left: auto; opacity: 0; transition: opacity .2s; }
  .nav button.done .check { opacity: 1; color: var(--good); }
  .nav .empty-tag { font-size: 10px; color: var(--muted); margin-left: auto; }

  .search { width: 100%; padding: 8px 10px; border: 1px solid var(--line);
    border-radius: 8px; background: var(--bg); color: var(--ink);
    font-family: inherit; font-size: 13px; margin-bottom: 12px; }

  .main { padding: 32px 48px; max-width: 920px; }
  .crumb { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .pageTitle { display: flex; align-items: center; gap: 12px; font-size: 28px;
    margin: 0 0 8px; }
  .pageTitle .icon { font-size: 32px; }
  .src-link { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
  .summary { font-size: 16px; color: var(--muted); margin-bottom: 20px; }

  .content { font-size: 15px; }
  .content h1 { font-size: 22px; margin-top: 1.4em; }
  .content h2 { font-size: 18px; margin-top: 1.4em; }
  .content h3 { font-size: 16px; margin-top: 1.2em; }
  .content ul, .content ol { padding-left: 22px; }
  .content li { margin: 4px 0; }

  .empty { padding: 18px; background: var(--accent-soft); border-radius: 10px;
    color: var(--ink); }

  table.md-table { border-collapse: collapse; width: 100%; margin: 14px 0;
    font-size: 14px; display: block; overflow-x: auto; }
  table.md-table th, table.md-table td { border: 1px solid var(--line);
    padding: 8px 12px; vertical-align: top; }
  table.md-table thead { background: var(--accent-soft); }
  table.md-table th { font-weight: 600; color: var(--ink); }
  table.md-table tbody tr:nth-child(even) { background: rgba(122,92,255,0.04); }

  /* TL;DR card at top of each section */
  .tldr { background: var(--accent-soft); border-left: 4px solid var(--accent);
    border-radius: 8px; padding: 12px 16px; margin: 0 0 22px;
    font-size: 15px; color: var(--ink); }
  .tldr .label { font-size: 11px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }

  /* Accordion sections */
  .content details { background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 4px 16px; margin: 10px 0;
    transition: box-shadow .2s; }
  .content details[open] { box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
  .content details > summary { cursor: pointer; padding: 12px 0;
    font-weight: 600; font-size: 16px; list-style: none;
    display: flex; align-items: center; gap: 10px; }
  .content details > summary::-webkit-details-marker { display: none; }
  .content details > summary::before { content: "▸"; color: var(--accent);
    transition: transform .2s; display: inline-block; }
  .content details[open] > summary::before { transform: rotate(90deg); }
  .content details > summary:hover { color: var(--accent); }
  .content details > .acc-body { padding: 0 0 12px; }

  /* Link cards (Curated Links page) */
  .link-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  @media (max-width: 720px) { .link-grid { grid-template-columns: 1fr; } }
  .link-card { background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px 16px; transition: transform .15s, box-shadow .15s; }
  .link-card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  .link-card .title { font-weight: 600; margin-bottom: 4px; display: flex;
    align-items: center; gap: 8px; }
  .link-card .desc { color: var(--muted); font-size: 13px; margin: 6px 0 8px; }
  .link-card .meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-size: 11px; background: var(--accent-soft); color: var(--accent); }
  .pill.must { background: rgba(255,184,107,0.2); color: #b07028; }
  .pill.optional { background: rgba(168,164,189,0.2); color: var(--muted); }

  .actions { display: flex; gap: 10px; margin: 28px 0 16px; flex-wrap: wrap; }
  .btn { all: unset; cursor: pointer; padding: 10px 16px; border-radius: 999px;
    background: var(--accent); color: white; font-size: 14px; font-weight: 600; }
  .btn.ghost { background: transparent; color: var(--accent);
    border: 1px solid var(--accent); }
  .btn.warm { background: var(--warm); color: #2c2a3a; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); font-size: 11px;
    font-weight: 600; margin-right: 6px; }
  .badge.good { background: rgba(48,196,141,0.15); color: var(--good); }

  .footer { font-size: 11px; color: var(--muted); margin-top: 40px;
    border-top: 1px solid var(--line); padding-top: 14px; }

  /* Quiz */
  .quiz-q { background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 16px; margin: 12px 0; }
  .quiz-q .q { font-weight: 600; margin-bottom: 10px; }
  .quiz-q .opt { display: block; padding: 8px 10px; border-radius: 6px;
    cursor: pointer; margin: 4px 0; }
  .quiz-q .opt:hover { background: var(--accent-soft); }
  .quiz-q .opt.right { background: rgba(48,196,141,0.15); color: var(--good); }
  .quiz-q .opt.wrong { background: rgba(255,107,107,0.15); color: var(--bad); }
  .quiz-score { font-size: 18px; font-weight: 700; margin-top: 18px; }

  /* Search results */
  mark { background: #fff2a8; color: #2c2a3a; padding: 0 2px; border-radius: 2px; }
  .search-hits { font-size: 12px; color: var(--muted); margin: 4px 0 0; }

  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
    .main { padding: 22px 18px; }
  }
</style>
</head>

<script type="application/json" id="buddy-data">{"meta":{"repoName":"twitter-clone-api","repoRoot":"/Users/brian/Desktop/twitter_clone","lastIndexedCommit":"1f9923bba8a513bc1c4018e38acdaaf31c52512b","lastRunTimestamp":"2026-05-30T21:46:45.798Z","generatedAt":"2026-05-30T21:46:45.798Z","linksCount":0},"sections":[{"id":"welcome","icon":"👋","title":"Welcome","source":"README_FOR_HUMANS.md","hasContent":true,"summary":"Your home page for the twitter-clone-api repo.","html":"<h1>Welcome! 👋</h1>\n<p>Hi there! I'm <strong>Buddy</strong>, your friendly guide to this repo.</p>\n<blockquote><strong>First time here?</strong> This file (and everything in <code>.buddy/</code>) is auto-generated to help you understand the project quickly.</blockquote>\n<hr/>\n<h2>What is this project?</h2>\n<p><strong>twitter-clone-api</strong> is a simple Twitter-like REST API. You can:</p>\n<ul>\n<li>✉️ <strong>Sign up / sign in</strong> with just an email (no password!)</li>\n<li>🐦 <strong>Create tweets</strong> (up to 280 characters)</li>\n<li>👥 <strong>Follow / unfollow</strong> other users</li>\n<li>❤️ <strong>Like / unlike</strong> tweets</li>\n<li>📰 <strong>View a feed</strong> of tweets from people you follow</li>\n</ul>\n<p>No frontend — just a JSON API. Talk to it with curl, Postman, or your own app.</p>\n<h2>Big-picture concepts</h2>\n<p>These 5 ideas will help you understand the code:</p>\n<ol>\n<li><strong>No passwords.</strong> Auth uses session tokens. Sign up with an email, get a token, send it as <code>Authorization: Bearer &lt;token&gt;</code>.</li>\n<li><strong>In-memory sessions.</strong> Tokens are in a <code>Map</code>. Server restart = everyone's logged out.</li>\n<li><strong>MySQL database.</strong> All data lives in MySQL. Raw SQL via <code>mysql2</code> — no ORM.</li>\n<li><strong>JSON responses.</strong> Every endpoint returns <code>{ \"data\": ... }</code> or <code>{ \"error\": \"...\" }</code>.</li>\n<li><strong>No tests yet.</strong> Great first contribution opportunity!</li>\n</ol>\n<h2>Quick links</h2>\n<ul>\n<li>🚀 <strong>Just want to run it?</strong> → <a href=\"#getting\" data-tour-link=\"1\"><code>Getting Started</code></a></li>\n<li>🗺️ <strong>Where does code live?</strong> → <a href=\"#map\" data-tour-link=\"1\"><code>Repo Map</code></a></li>\n<li>🏛️ <strong>How is it built?</strong> → <a href=\"#architecture\" data-tour-link=\"1\"><code>Architecture</code></a></li>\n<li>🧰 <strong>What tech does it use?</strong> → <a href=\"#tech\" data-tour-link=\"1\"><code>Tech Stack</code></a></li>\n<li>🔌 <strong>What does it talk to?</strong> → <a href=\"#integrations\" data-tour-link=\"1\"><code>Integrations</code></a></li>\n<li>📜 <strong>What changed recently?</strong> → <a href=\"#changelog\" data-tour-link=\"1\"><code>Recent Changes</code></a></li>\n<li>❓ <strong>Things we don't know yet</strong> → <a href=\"#questions\" data-tour-link=\"1\"><code>Open Questions</code></a></li>\n<li>🔗 <strong>Important external links</strong> → <a href=\"#links\" data-tour-link=\"1\"><code>Curated Links</code></a></li>\n</ul>"},{"id":"getting","icon":"🚀","title":"Get It Running","source":"GETTING_STARTED.md","hasContent":true,"summary":"Get the API running locally in 5 minutes.","html":"<h1>Get It Running</h1>\n<h2>Prerequisites</h2>\n<ul>\n<li><strong>Node.js</strong> v18 or newer</li>\n<li><strong>pnpm</strong> — <code>npm install -g pnpm</code></li>\n<li><strong>MySQL</strong> running locally (port 3306 or socket)</li>\n</ul>\n<h2>Database setup</h2>\n<p>Create the database and tables yourself (no migration files):</p>\n<pre class=\"code\"><code data-lang=\"sql\">CREATE DATABASE twitter_db;\nUSE twitter_db;\n\nCREATE TABLE users (\n  user_id INT AUTO_INCREMENT PRIMARY KEY,\n  user_handle VARCHAR(50) NOT NULL UNIQUE,\n  email_address VARCHAR(255) NOT NULL UNIQUE,\n  first_name VARCHAR(100) NOT NULL,\n  last_name VARCHAR(100) NOT NULL,\n  phone_number VARCHAR(20),\n  follower_count INT DEFAULT 0,\n  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n);\n\nCREATE TABLE tweets (\n  tweet_id INT AUTO_INCREMENT PRIMARY KEY,\n  user_id INT NOT NULL,\n  tweet_text VARCHAR(280) NOT NULL,\n  likes_count INT DEFAULT 0,\n  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n  FOREIGN KEY (user_id) REFERENCES users(user_id)\n);\n\nCREATE TABLE followers (\n  follower_id INT NOT NULL,\n  following_id INT NOT NULL,\n  PRIMARY KEY (follower_id, following_id),\n  FOREIGN KEY (follower_id) REFERENCES users(user_id),\n  FOREIGN KEY (following_id) REFERENCES users(user_id)\n);\n\nCREATE TABLE tweet_likes (\n  user_id INT NOT NULL,\n  tweet_id INT NOT NULL,\n  PRIMARY KEY (user_id, tweet_id),\n  FOREIGN KEY (user_id) REFERENCES users(user_id),\n  FOREIGN KEY (tweet_id) REFERENCES tweets(tweet_id)\n);</code></pre>\n<h2>Install &amp; configure</h2>\n<pre class=\"code\"><code data-lang=\"bash\"># Install dependencies\npnpm install\n\n# Copy environment file (edit if needed)\ncp .env.example .env</code></pre>\n<p>Key environment variables (defaults in <code>.env.example</code>):</p>\n<table class=\"md-table\">\n<thead><tr><th>Variable</th><th>Default</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><code>PORT</code></td><td>3000</td><td>Server port</td></tr>\n<tr><td><code>DB_HOST</code></td><td>127.0.0.1</td><td>MySQL host</td></tr>\n<tr><td><code>DB_PORT</code></td><td>3306</td><td>MySQL port</td></tr>\n<tr><td><code>DB_USER</code></td><td>root</td><td>MySQL user</td></tr>\n<tr><td><code>DB_PASSWORD</code></td><td><em>(empty)</em></td><td>MySQL password</td></tr>\n<tr><td><code>DB_NAME</code></td><td>twitter_db</td><td>Database name</td></tr>\n<tr><td><code>DB_SOCKET</code></td><td>/tmp/mysql_3306.sock</td><td>Socket path</td></tr>\n</tbody>\n</table>\n<h2>Run</h2>\n<pre class=\"code\"><code data-lang=\"bash\"># Dev mode (hot reload)\npnpm dev\n\n# Build for production\npnpm build\n\n# Run production build (after build)\npnpm start</code></pre>\n<h2>Smoke test</h2>\n<pre class=\"code\"><code data-lang=\"bash\"># Sign up\ncurl -X POST http://localhost:3000/api/auth/signup \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"user_handle\":\"alice\",\"email_address\":\"alice@test.com\",\"first_name\":\"Alice\",\"last_name\":\"Smith\"}'\n\n# Sign in (save the token)\ncurl -X POST http://localhost:3000/api/auth/signin \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"email_address\":\"alice@test.com\"}'\n\n# Create a tweet (replace TOKEN)\ncurl -X POST http://localhost:3000/api/tweets \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer TOKEN\" \\\n  -d '{\"tweet_text\":\"Hello from Buddy!\"}'</code></pre>\n<h2>Common problems</h2>\n<table class=\"md-table\">\n<thead><tr><th>Problem</th><th>Fix</th></tr></thead>\n<tbody>\n<tr><td><code>ECONNREFUSED</code></td><td>Start MySQL, check <code>DB_HOST</code>/<code>DB_PORT</code> in <code>.env</code></td></tr>\n<tr><td><code>Unknown database 'twitter_db'</code></td><td>Run <code>CREATE DATABASE twitter_db;</code></td></tr>\n<tr><td><code>ERR_MODULE_NOT_FOUND</code></td><td>ESM project uses <code>.js</code> extensions — that's correct</td></tr>\n<tr><td>Syntax errors</td><td>Need Node.js 18+ (<code>crypto.randomUUID()</code>)</td></tr>\n</tbody>\n</table>\n<h2>Tests</h2>\n<p>None yet! No test framework is installed. That's a great first contribution.</p>"},{"id":"tech","icon":"🧰","title":"Tech Stack","source":"TECH_STACK.md","hasContent":true,"summary":"TypeScript + Express + MySQL2 on pnpm.","html":"<h1>Tech Stack</h1>\n<p>Everything is in <strong>TypeScript</strong> targeting <strong>ES2022</strong>. The project uses <strong>ESM</strong> (<code>\"type\": \"module\"</code> in <code>package.json</code>), so all local imports use <code>.js</code> extensions.</p>\n<h2>Frameworks &amp; libraries</h2>\n<table class=\"md-table\">\n<thead><tr><th>Library</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><strong>Express</strong> (^4.21)</td><td>HTTP server, routing, middleware</td></tr>\n<tr><td><strong>mysql2</strong> (^3.11)</td><td>MySQL database driver (Promise API)</td></tr>\n</tbody>\n</table>\n<h2>Build &amp; dev tools</h2>\n<table class=\"md-table\">\n<thead><tr><th>Tool</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><strong>TypeScript (tsc)</strong></td><td>Compiles <code>.ts</code> → <code>.js</code> to <code>dist/</code></td></tr>\n<tr><td><strong>tsx</strong> (^4.19)</td><td>Dev server with hot reload (<code>tsx watch src/index.ts</code>)</td></tr>\n<tr><td><strong>pnpm</strong></td><td>Package manager</td></tr>\n</tbody>\n</table>\n<h2>TypeScript config highlights</h2>\n<table class=\"md-table\">\n<thead><tr><th>Setting</th><th>Value</th><th>Why</th></tr></thead>\n<tbody>\n<tr><td><code>moduleResolution</code></td><td><code>bundler</code></td><td>Supports <code>.js</code> import extensions</td></tr>\n<tr><td><code>strict</code></td><td><code>true</code></td><td>Full type checking</td></tr>\n<tr><td><code>outDir</code></td><td><code>./dist</code></td><td>Compiled output</td></tr>\n<tr><td><code>target</code></td><td><code>ES2022</code></td><td>Modern JS features</td></tr>\n</tbody>\n</table>\n<h2>Tests</h2>\n<p><strong>None yet.</strong> No test framework, no test files, no test scripts.</p>\n<h2>CI / Deploy</h2>\n<p><strong>None yet.</strong> The <code>.github/</code> folder exists but only contains <code>FUNDING.yml</code> — no CI workflows.</p>"},{"id":"architecture","icon":"🏛️","title":"Architecture","source":"ARCHITECTURE.md","hasContent":true,"summary":"Layered Express API: Routes → Middleware → Controllers → Models → MySQL.","html":"<h1>Architecture</h1>\n<p>This is a <strong>layered Express API</strong>. A request flows through 4 layers: Routes → Middleware → Controllers → Models.</p>\n<h2>Major components</h2>\n<table class=\"md-table\">\n<thead><tr><th>Layer</th><th>Directory</th><th>Job</th></tr></thead>\n<tbody>\n<tr><td><strong>Routes</strong></td><td><code>src/routes/</code></td><td>Map URLs to middleware + controllers</td></tr>\n<tr><td><strong>Middleware</strong></td><td><code>src/middleware/</code></td><td>Auth checks, validation, error handling</td></tr>\n<tr><td><strong>Controllers</strong></td><td><code>src/controllers/</code></td><td>Decide what to do with a request</td></tr>\n<tr><td><strong>Models</strong></td><td><code>src/models/</code></td><td>SQL queries against MySQL</td></tr>\n<tr><td><strong>Validators</strong></td><td><code>src/validators/</code></td><td>Per-route input validation functions</td></tr>\n<tr><td><strong>Config</strong></td><td><code>src/config/</code></td><td>Environment config, DB pool, validation flags</td></tr>\n<tr><td><strong>Types</strong></td><td><code>src/types/</code></td><td>TypeScript interfaces (User, Tweet, etc.)</td></tr>\n</tbody>\n</table>\n<h2>Example: Creating a tweet</h2>\n<pre>1. POST /api/tweets\n       │\n2.      ▼\n   [authMiddleware]  — reads Authorization header, sets req.userId\n       │\n3.      ▼\n   [validationMiddleware] — checks tweet_text ≤ 280 chars\n       │\n4.      ▼\n   [tweetController.create] — orchestrates the logic\n       │\n5.      ▼\n   [tweetModel.createTweet()] — INSERT INTO tweets SQL\n       │\n6.      ▼\n   Response: { data: { tweet_id: 1, ... } }  (201)</pre>\n<h2>Example: Getting the feed</h2>\n<pre>1. GET /api/feed?limit=20&amp;offset=0\n       │\n2.      ▼\n   [authMiddleware]\n       │\n3.      ▼\n   [tweetController.feed] — parses limit/offset\n       │\n4.      ▼\n   [tweetModel.getFeedForUser()] — SELECT with JOIN on followers\n       │\n5.      ▼\n   Response: { data: [tweet, ...] }  (200)</pre>\n<h2>Key rules</h2>\n<ul>\n<li>Routes never do logic — just wire things up.</li>\n<li>Controllers never touch the database directly.</li>\n<li>Models never send HTTP responses.</li>\n<li>Middleware never calls models (except auth creates/destroys sessions).</li>\n<li>All endpoints return <code>{ data: ... }</code> or <code>{ error: \"...\" }</code>.</li>\n<li>Auth is purely in-memory — restart the server and everyone's logged out.</li>\n</ul>"},{"id":"integrations","icon":"🔌","title":"Integrations","source":"INTEGRATIONS.md","hasContent":true,"summary":"Just MySQL. No external auth, no third-party APIs.","html":"<h1>External Integrations</h1>\n<p>The project connects to exactly <strong>one</strong> external service: MySQL.</p>\n<h2>MySQL Database</h2>\n<table class=\"md-table\">\n<thead><tr><th>Detail</th><th>Value</th></tr></thead>\n<tbody>\n<tr><td>Driver</td><td><code>mysql2</code> with Promise API</td></tr>\n<tr><td>Connection</td><td>Lazy-initialized pool (first query creates it)</td></tr>\n<tr><td>Default host</td><td><code>127.0.0.1</code> or socket <code>/tmp/mysql_3306.sock</code></td></tr>\n<tr><td>Default port</td><td>3306</td></tr>\n<tr><td>Default database</td><td><code>twitter_db</code></td></tr>\n</tbody>\n</table>\n<h3>Tables</h3>\n<table class=\"md-table\">\n<thead><tr><th>Table</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><code>users</code></td><td>User profiles (handle, email, name, follower count)</td></tr>\n<tr><td><code>tweets</code></td><td>Tweet text, author, likes count</td></tr>\n<tr><td><code>followers</code></td><td>Who follows whom</td></tr>\n<tr><td><code>tweet_likes</code></td><td>Who liked which tweet</td></tr>\n</tbody>\n</table>\n<p><strong>No migration files</strong> — tables must be created manually.</p>\n<h2>Auth</h2>\n<p><strong>No external auth provider.</strong> Sessions are in-memory only:</p>\n<ul>\n<li>Tokens generated with <code>crypto.randomUUID()</code></li>\n<li>Stored in a <code>Map&lt;string, number&gt;</code> in <code>src/middleware/auth.ts</code></li>\n<li>No JWT, no OAuth, no bcrypt, no database persistence</li>\n<li>Restart the server = all sessions are lost</li>\n</ul>\n<h2>Configuration</h2>\n<p>All configuration comes from environment variables in <code>.env</code> (gitignored). See <code>.env.example</code> for the template.</p>\n<table class=\"md-table\">\n<thead><tr><th>Variable</th><th>Type</th><th>Secret?</th></tr></thead>\n<tbody>\n<tr><td><code>PORT</code></td><td>number</td><td>No</td></tr>\n<tr><td><code>DB_HOST</code></td><td>string</td><td>No</td></tr>\n<tr><td><code>DB_PORT</code></td><td>number</td><td>No</td></tr>\n<tr><td><code>DB_USER</code></td><td>string</td><td>Maybe</td></tr>\n<tr><td><code>DB_PASSWORD</code></td><td>string</td><td><strong>Yes</strong></td></tr>\n<tr><td><code>DB_NAME</code></td><td>string</td><td>No</td></tr>\n<tr><td><code>DB_SOCKET</code></td><td>string</td><td>No</td></tr>\n</tbody>\n</table>"},{"id":"map","icon":"🗺️","title":"Repo Map","source":"MAP/repo_map.md","hasContent":true,"summary":"A folder-by-folder tour of the codebase.","html":"<h1>Repo Map</h1>\n<p>All source code lives in <code>src/</code>. Here's what's where.</p>\n<h2>Top-level files</h2>\n<table class=\"md-table\">\n<thead><tr><th>File</th><th>Purpose</th></tr></thead>\n<tbody>\n<tr><td><code>package.json</code></td><td>Project config, scripts, dependencies</td></tr>\n<tr><td><code>tsconfig.json</code></td><td>TypeScript compiler settings</td></tr>\n<tr><td><code>.env</code> / <code>.env.example</code></td><td>Environment variables</td></tr>\n<tr><td><code>AGENTS.md</code></td><td>Quick reference for AI agents</td></tr>\n</tbody>\n</table>\n<h2>Inside <code>src/</code></h2>\n<table class=\"md-table\">\n<thead><tr><th>Folder</th><th>Purpose</th><th>Key files</th></tr></thead>\n<tbody>\n<tr><td><code>routes/</code></td><td>API endpoint definitions</td><td><code>authRoutes.ts</code>, <code>tweetRoutes.ts</code>, <code>userRoutes.ts</code>, <code>followRoutes.ts</code></td></tr>\n<tr><td><code>controllers/</code></td><td>Request handling &amp; business logic</td><td><code>authController.ts</code>, <code>tweetController.ts</code>, <code>userController.ts</code>, <code>followController.ts</code>, <code>likeController.ts</code></td></tr>\n<tr><td><code>models/</code></td><td>SQL queries (database layer)</td><td><code>userModel.ts</code>, <code>tweetModel.ts</code>, <code>followModel.ts</code>, <code>likeModel.ts</code></td></tr>\n<tr><td><code>middleware/</code></td><td>Auth, validation, error handling</td><td><code>auth.ts</code>, <code>validation.ts</code>, <code>errorHandler.ts</code></td></tr>\n<tr><td><code>validators/</code></td><td>Input validation functions</td><td><code>authValidator.ts</code>, <code>tweetValidator.ts</code>, <code>helpers.ts</code></td></tr>\n<tr><td><code>config/</code></td><td>App config, DB pool, validation flags</td><td><code>index.ts</code></td></tr>\n<tr><td><code>types/</code></td><td>TypeScript interfaces</td><td><code>index.ts</code></td></tr>\n<tr><td><code>app.ts</code></td><td>Express app setup</td><td>Entry point for the app</td></tr>\n<tr><td><code>index.ts</code></td><td>Server startup</td><td>Listens on PORT</td></tr>\n</tbody>\n</table>\n<h2>Where to start reading</h2>\n<ol>\n<li><strong><code>src/app.ts</code></strong> — See all routes wired up at a glance.</li>\n<li><strong><code>src/routes/authRoutes.ts</code></strong> — Follow a simple signup flow.</li>\n<li><strong><code>src/controllers/authController.ts</code></strong> — See how controllers work.</li>\n<li><strong><code>src/models/userModel.ts</code></strong> — See how database queries work.</li>\n<li><strong><code>src/middleware/auth.ts</code></strong> — Understand the auth system.</li>\n</ol>"},{"id":"entry","icon":"🚪","title":"Entry Points","source":"MAP/entry_points.md","hasContent":true,"summary":"Dev server, production server, build — all start from src/index.ts.","html":"<h1>Entry Points</h1>\n<p>Where execution starts — three ways to run this project:</p>\n<table class=\"md-table\">\n<thead><tr><th>Entry</th><th>Command</th><th>File</th><th>What it does</th></tr></thead>\n<tbody>\n<tr><td><strong>Dev server</strong></td><td><code>pnpm dev</code></td><td><code>src/index.ts</code></td><td>Starts Express with hot reload via <code>tsx watch</code></td></tr>\n<tr><td><strong>Production server</strong></td><td><code>pnpm start</code></td><td><code>dist/index.js</code></td><td>Runs compiled JS (after <code>pnpm build</code>)</td></tr>\n<tr><td><strong>Build</strong></td><td><code>pnpm build</code></td><td><code>tsconfig.json</code></td><td>Compiles TypeScript → JS in <code>dist/</code></td></tr>\n</tbody>\n</table>"},{"id":"flow","icon":"🔁","title":"Data Flow","source":"MAP/data_flow.md","hasContent":true,"summary":"Request → Auth → Validate → Controller → Model → SQL → Response.","html":"<h1>Data Flow</h1>\n<p>Here's how each API call flows through the system.</p>\n<h2>Sign up</h2>\n<pre>Client → POST /api/auth/signup\n  → validationMiddleware (checks handle, email, name)\n  → authController.signup\n    → userModel.findUserByEmail (check duplicate email)\n    → userModel.findUserByHandle (check duplicate handle)\n    → userModel.createUser (INSERT INTO users)\n    → createSession (stores token in Map)\n  ← 201: { data: { session_token, user } }</pre>\n<h2>Sign in</h2>\n<pre>Client → POST /api/auth/signin\n  → validationMiddleware (checks email)\n  → authController.signin\n    → userModel.findUserByEmail (look up user)\n    → createSession (stores token in Map)\n  ← { data: { session_token, user } }</pre>\n<h2>Create tweet</h2>\n<pre>Client → POST /api/tweets (Authorization: Bearer &lt;token&gt;)\n  → authMiddleware (validates token, sets req.userId)\n  → validationMiddleware (tweet_text ≤ 280 chars)\n  → tweetController.create\n    → tweetModel.createTweet (INSERT INTO tweets)\n  ← 201: { data: { tweet_id, tweet_text, ... } }</pre>\n<h2>Get feed</h2>\n<pre>Client → GET /api/feed?limit=20&amp;offset=0\n  → authMiddleware\n  → feed controller\n    → tweetModel.getFeedForUser (SELECT from followed users)\n  ← { data: [tweet, ...] }</pre>\n<h2>Follow a user</h2>\n<pre>Client → POST /api/followers (body: { following_id })\n  → authMiddleware\n  → validationMiddleware\n  → followController.follow\n    → userModel.findUserById (check target exists)\n    → followModel.isFollowing (check not already)\n    → followModel.followUser (INSERT INTO followers)\n    → userModel.updateFollowerCount (increment)\n  ← 201: { data: { message: \"Now following user\" } }</pre>\n<h2>Like a tweet</h2>\n<pre>Client → POST /api/tweets/:id/like\n  → authMiddleware\n  → validateParam('id') (must be positive integer)\n  → likeController.like\n    → tweetModel.findTweetById (check exists)\n    → likeModel.hasLiked (check not already)\n    → likeModel.likeTweet (INSERT INTO tweet_likes)\n    → tweetModel.updateLikesCount (increment)\n  ← 201: { data: { message: \"Tweet liked\" } }</pre>"},{"id":"changelog","icon":"📜","title":"Recent Changes","source":"CHANGELOG_SUMMARY.md","hasContent":true,"summary":"3 initial commits — brand new project (May 2026).","html":"<h1>Recent Changes</h1>\n<p>This is a <strong>brand-new project</strong> with 3 commits (all on 2026-05-30):</p>\n<h2>Commit history</h2>\n<ul>\n<li><strong><code>53a747c</code></strong> — <em>feat: initial project setup</em><br/>\n  Express + TypeScript + MySQL2 skeleton with all routes, controllers, models, middleware, validators, and in-memory session auth.</li>\n<li><strong><code>6a17557</code></strong> — <em>docs: add AGENTS.md</em><br/>\n  Added the project quick-reference doc for AI agents.</li>\n<li><strong><code>1f9923b</code></strong> — <em>docs: add .env.example and fix AGENTS.md env note</em><br/>\n  Added environment variable template and fixed the docs.</li>\n</ul>\n<h2>What's missing (good first issues!)</h2>\n<ul>\n<li>❌ No test files or test framework</li>\n<li>❌ No lint/format scripts (ESLint, Prettier)</li>\n<li>❌ No CI pipeline (GitHub Actions)</li>\n<li>❌ No database migration files</li>\n</ul>"},{"id":"starter","icon":"🎯","title":"Starter Tasks","source":"STARTER_TASKS.md","hasContent":true,"summary":"Tiny first things to try — pick one and ship it.","html":"<h1>Starter Tasks</h1>\n<p>Friendly first things to try in this repo. Pick <strong>one</strong> and ship it — small wins beat big plans.</p>\n<h2>Warm-up (≈ 15 min)</h2>\n<ul>\n<li>Run the project locally following <code>GETTING_STARTED.md</code> end-to-end. Note any step that wasn't obvious.</li>\n<li>Find one typo or unclear sentence in a <code>.buddy/</code> doc and open a tiny PR fixing it.</li>\n</ul>\n<h2>First real change (≈ 1–2 hrs)</h2>\n<ul>\n<li><strong>Add a test.</strong> There are zero tests. Pick a model function and write a basic test.</li>\n<li><strong>Improve an error message.</strong> Find one that confused you and make it clearer.</li>\n<li><strong>Add validation.</strong> Some routes have validation toggled off via <code>validationFlags</code> in <code>src/config/index.ts</code> — turn one on.</li>\n</ul>\n<h2>Learn by doing</h2>\n<ul>\n<li>Trace a single request from entry point → handler → response. Add a comment explaining what you found.</li>\n<li>Read <code>src/middleware/auth.ts</code> — it's only ~40 lines and explains the whole auth system.</li>\n<li>Read <code>src/config/index.ts</code> — see how DB pool and validation flags work.</li>\n</ul>\n<h2>Tips</h2>\n<ul>\n<li><strong>Ask early.</strong> If a task takes &gt;30 min just to understand, share that feedback.</li>\n<li><strong>Tiny PRs win.</strong> A one-line fix you ship today beats a refactor you ship next month.</li>\n<li><strong>Update Buddy.</strong> When you learn something, add it to the matching <code>.buddy/*.md</code> doc.</li>\n</ul>"},{"id":"questions","icon":"❓","title":"Open Questions","source":"NOTES/open_questions.md","hasContent":true,"summary":"Things Buddy couldn't figure out from the code alone.","html":"<h1>Open Questions</h1>\n<p>Things Buddy couldn't figure out from the repo alone. Help answer these!</p>\n<h2>Database schema</h2>\n<ul>\n<li>What does the full <code>users</code> table schema look like? Columns are inferred from types and queries but the actual <code>CREATE TABLE</code> statement isn't in the repo.</li>\n<li>Are there any indexes beyond primary keys?</li>\n<li>Are there <code>ON DELETE CASCADE</code> foreign keys?</li>\n</ul>\n<h2>Missing pieces</h2>\n<ul>\n<li>What test framework would be preferred? (None is set up yet.)</li>\n<li>Is there a planned CI pipeline? (<code>.github/</code> has only <code>FUNDING.yml</code>.)</li>\n<li>Are there lint/formatting conventions? (ESLint? Prettier?)</li>\n<li>Should database migration files be created, or is manual SQL intentional?</li>\n</ul>\n<h2>Assumptions Buddy made</h2>\n<ul>\n<li>The MySQL socket path <code>/tmp/mysql_3306.sock</code> works on this machine (can use TCP via <code>DB_HOST</code>/<code>DB_PORT</code> if not).</li>\n<li>Database tables must be created manually — no migration files exist.</li>\n<li>Column names in <code>src/types/index.ts</code> match actual database columns.</li>\n<li><code>pnpm</code> is the package manager (from <code>package.json</code> + lockfile).</li>\n<li>This is a learning project / toy API, not meant for production (in-memory auth, no tests, no CI).</li>\n</ul>"},{"id":"links","icon":"🔗","title":"Curated Links","source":"LINKS.md","hasContent":true,"summary":"No external links saved yet. Add some with 'buddy link'.","html":"<h1>Curated Links</h1>\n<p>Important external docs, references, and resources for this project.</p>\n<blockquote>⚠️ Buddy never reads linked pages. It only stores metadata. If you want a summary, paste the contents into chat.</blockquote>\n<p>Add a link from the terminal:</p>\n<pre class=\"code\"><code data-lang=\"bash\">buddy link https://example.com/doc --title \"MySQL reference\" --tags database --relevance must-read</code></pre>\n<p>Or ask Buddy: <em>\"here's a link: https://… it's our MySQL setup guide.\"</em></p>\n<h2>Must-read</h2>\n<p><em>(none yet — add one with <code>buddy link</code>)</em></p>\n<h2>Helpful</h2>\n<p><em>(none yet)</em></p>\n<h2>Optional</h2>\n<p><em>(none yet)</em></p>"}],"quiz":[{"q":"What kind of auth does twitter-clone-api use?","choices":["JWT tokens stored in the database","In-memory session tokens with crypto.randomUUID()","OAuth 2.0 with GitHub","API keys in the .env file"],"answer":1},{"q":"What file extension must local imports use in this ESM project?","choices":[".ts",".js",".mjs","No extension needed"],"answer":1},{"q":"What happens to all user sessions when the server restarts?","choices":["They're persisted to the MySQL database","They're saved to disk","They're lost — the session Map is in memory","They're backed by Redis"],"answer":2},{"q":"What is the maximum tweet length?","choices":["140 characters","280 characters","300 characters","No limit"],"answer":1},{"q":"Which folder contains all the SQL database queries?","choices":["src/routes/","src/controllers/","src/models/","src/middleware/"],"answer":2},{"q":"What default MySQL socket path does the project use?","choices":["/var/run/mysqld/mysqld.sock","/tmp/mysql.sock","/tmp/mysql_3306.sock","/opt/homebrew/var/mysql/mysql.sock"],"answer":2},{"q":"What response format does every API endpoint use?","choices":["{ data: ... } on success, { error: \"...\" } on failure","Just the raw data as JSON","XML","Plain text"],"answer":0},{"q":"What command starts the dev server with hot reload?","choices":["npm start","pnpm dev","pnpm build","node src/index.ts"],"answer":1}],"links":[]}</script>
<script>
(function(){
  const raw = document.getElementById('buddy-data').textContent;
  const DATA = JSON.parse(raw);
  const STORAGE_KEY = 'buddy-tour:' + (DATA.meta.repoName || 'repo');
  const state = loadState();

  function loadState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { done: {}, quiz: null }; }
    catch { return { done: {}, quiz: null }; }
  }
  function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {} }

  const ALL_STEPS = DATA.sections.concat([
    { id: '__quiz__', icon: '🎓', title: 'Graduation Quiz', isQuiz: true, hasContent: true },
  ]);

  document.getElementById('repoName').textContent = '📦 ' + (DATA.meta.repoName || 'repo');

  const nav = document.getElementById('nav');
  ALL_STEPS.forEach((s, idx) => {
    const b = document.createElement('button');
    b.dataset.id = s.id;
    b.innerHTML = '<span>' + s.icon + '</span><span>' + (idx + 1) + '. ' + escapeHtml(s.title) + '</span>'
      + (s.hasContent ? '' : '<span class="empty-tag">empty</span>')
      + '<span class="check">✓</span>';
    b.onclick = () => navigate(s.id);
    nav.appendChild(b);
  });

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  function refreshNav() {
    const total = ALL_STEPS.length;
    let done = 0;
    Array.from(nav.children).forEach((btn) => {
      const id = btn.dataset.id;
      if (state.done[id]) { btn.classList.add('done'); done++; }
      else btn.classList.remove('done');
      btn.classList.toggle('active', id === currentId);
    });
    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('xpBar').style.width = pct + '%';
    document.getElementById('xpText').textContent =
      done + ' / ' + total + ' steps complete  •  ' + pct + ' XP';
  }

  let currentId = ALL_STEPS[0].id;
  function navigate(id) {
    currentId = id;
    if (id === '__quiz__') renderQuiz();
    else renderSection(DATA.sections.find((x) => x.id === id));
    refreshNav();
    history.replaceState(null, '', '#' + id);
  }

  function markDone(id) { state.done[id] = true; saveState(); refreshNav(); }

  function renderSection(s) {
    const idx = ALL_STEPS.findIndex((x) => x.id === s.id);
    const next = ALL_STEPS[idx + 1];
    const main = document.getElementById('main');

    // Special, more visual rendering for the Curated Links page.
    let body;
    if (s.id === 'links' && Array.isArray(DATA.links) && DATA.links.length) {
      body = renderLinksGrid(DATA.links);
    } else if (s.hasContent) {
      body = '<div class="content">' + s.html + '</div>';
    } else {
      body = '<div class="empty"><strong>This section is empty.</strong> Ask Buddy in your CLI: '
           + '<code>"Scan this repo and fill in .buddy/' + escapeHtml(s.source) + '"</code>.</div>';
    }

    main.innerHTML =
      '<div class="crumb">Step ' + (idx + 1) + ' of ' + ALL_STEPS.length + '</div>'
      + '<h1 class="pageTitle"><span class="icon">' + s.icon + '</span>'
      + escapeHtml(s.title) + '</h1>'
      + (s.summary ? '<div class="tldr"><div class="label">In one line</div>' + escapeHtml(s.summary) + '</div>' : '')
      + '<div class="src-link">📖 Source: <code>.buddy/' + escapeHtml(s.source) + '</code></div>'
      + body
      + '<div class="actions">'
      + '<button class="btn" id="btnDone">' + (state.done[s.id] ? '✓ Marked complete' : 'Mark complete & continue') + '</button>'
      + (next ? '<button class="btn ghost" id="btnNext">Next: ' + escapeHtml(next.title) + ' →</button>' : '')
      + '</div>'
      + '<div class="footer">Generated ' + new Date(DATA.meta.generatedAt).toLocaleString()
      + (DATA.meta.lastIndexedCommit ? ' • Indexed commit ' + DATA.meta.lastIndexedCommit.slice(0,8) : '')
      + '</div>';

    document.getElementById('btnDone').onclick = function(){
      markDone(s.id);
      if (next) navigate(next.id);
    };
    if (next) document.getElementById('btnNext').onclick = function(){
      markDone(s.id); navigate(next.id);
    };
    accordionizeContent(main);
    addCopyButtons(main);
    wireInternalLinks(main);
  }

  // Track scroll listener cleanup so navigating between sidebar sections
  // doesn't leave stale handlers attached to detached DOM.
  let scrollCleanup = null;

  function renderLinksGrid(links) {
    const cards = links.map((l) => {
      const tagPills = (l.tags || []).map((t) =>
        '<span class="pill">' + escapeHtml(t) + '</span>').join('');
      const relPill = '<span class="pill ' + (l.relevance === 'must-read' ? 'must' :
        l.relevance === 'optional' ? 'optional' : '') + '">'
        + escapeHtml(l.relevance || 'helpful') + '</span>';
      const safeUrl = /^(https?:|mailto:)/i.test(l.url || '') ? l.url : '#';
      return '<a class="link-card" href="' + escapeHtml(safeUrl) + '" target="_blank" rel="noopener">'
        + '<div class="title">🔗 ' + escapeHtml(l.title) + '</div>'
        + (l.description ? '<div class="desc">' + escapeHtml(l.description) + '</div>' : '')
        + '<div class="meta">' + relPill + tagPills + '</div>'
        + '</a>';
    }).join('');
    return '<div class="link-grid">' + cards + '</div>';
  }

  // Wrap H2 sections of rendered markdown into <details> accordions.
  // First accordion is open by default so the page never looks empty.
  function accordionizeContent(root) {
    const content = root.querySelector('.content');
    if (!content) return;
    const children = Array.from(content.children);
    if (children.filter((c) => c.tagName === 'H2').length < 2) return;
    // Unique group name so opening one card auto-closes its siblings
    // (native exclusive-accordion behavior in modern browsers).
    const groupName = 'acc-' + Math.random().toString(36).slice(2, 9);
    const frag = document.createDocumentFragment();
    const detailsList = [];
    let bucket = null;
    let firstOpen = true;
    for (const el of children) {
      if (el.tagName === 'H2') {
        const det = document.createElement('details');
        det.name = groupName;
        if (firstOpen) { det.open = true; firstOpen = false; }
        const sum = document.createElement('summary');
        sum.innerHTML = el.innerHTML;
        const accBody = document.createElement('div');
        accBody.className = 'acc-body';
        det.appendChild(sum);
        det.appendChild(accBody);
        frag.appendChild(det);
        detailsList.push(det);
        bucket = accBody;
      } else if (bucket) {
        bucket.appendChild(el);
      } else {
        frag.appendChild(el);
      }
    }
    content.innerHTML = '';
    content.appendChild(frag);
    // Fallback for browsers without exclusive <details name=...> support.
    detailsList.forEach((d) => {
      d.addEventListener('toggle', () => {
        if (!d.open) return;
        detailsList.forEach((o) => { if (o !== d && o.open) o.open = false; });
      });
    });
    // Auto-open the section the user scrolls to. Driven by real scroll
    // events (not IntersectionObserver), so layout shifts caused by
    // opening a card do not re-trigger and fight the user's clicks.
    if (scrollCleanup) { scrollCleanup(); scrollCleanup = null; }
    let userClickLock = 0;
    let lastAdvanceAt = 0;
    let wheelAccum = 0;
    detailsList.forEach((d) => {
      const sum = d.querySelector('summary');
      if (sum) {
        sum.addEventListener('click', () => {
          // Briefly ignore scroll-driven auto-open after a manual click,
          // so the user's choice sticks even if the page reflows.
          userClickLock = Date.now() + 800;
          wheelAccum = 0;
        });
      }
    });
    function handoff(dir) {
      const now = Date.now();
      if (now < userClickLock) return;
      if (now - lastAdvanceAt < 250) return;
      const openIdx = detailsList.findIndex((d) => d.open);
      if (openIdx === -1) { detailsList[0].open = true; return; }
      if (dir > 0) {
        const next = detailsList[openIdx + 1];
        if (next) { next.open = true; lastAdvanceAt = now; }
      } else if (dir < 0) {
        const prev = detailsList[openIdx - 1];
        if (prev) { prev.open = true; lastAdvanceAt = now; }
      }
    }
    function onWheel(e) {
      // Wheel events fire even when the page is not scrollable, so this is
      // the most reliable signal. Accumulate deltaY and hand off when it
      // crosses a threshold — this also debounces trackpad inertia.
      wheelAccum += e.deltaY;
      if (Math.abs(wheelAccum) >= 80) {
        const dir = wheelAccum > 0 ? 1 : -1;
        wheelAccum = 0;
        handoff(dir);
      }
    }
    function onKey(e) {
      if (['ArrowDown','PageDown','End',' '].includes(e.key)) handoff(1);
      else if (['ArrowUp','PageUp','Home'].includes(e.key)) handoff(-1);
    }
    // Also keep a scroll-based path: on scrollable pages, when the open
    // card's body scrolls out of view, advance. This complements wheel
    // accumulation for users who scroll via scrollbar / middle-click.
    let prevScrollY = window.scrollY;
    function onScroll() {
      const y = window.scrollY;
      const dy = y - prevScrollY;
      prevScrollY = y;
      if (Date.now() < userClickLock) return;
      if (Date.now() - lastAdvanceAt < 250) return;
      const openIdx = detailsList.findIndex((d) => d.open);
      if (openIdx === -1) return;
      const open = detailsList[openIdx];
      const r = open.getBoundingClientRect();
      const vh = window.innerHeight;
      if (dy > 0) {
        const next = detailsList[openIdx + 1];
        if (next && r.bottom < vh * 0.35) handoff(1);
      } else if (dy < 0) {
        const prev = detailsList[openIdx - 1];
        if (prev && r.top > vh * 0.55) handoff(-1);
      }
    }
    const targets = [window, document, document.documentElement, document.body];
    targets.forEach((t) => t.addEventListener('scroll', onScroll, { passive: true }));
    window.addEventListener('wheel', onWheel, { passive: true });
    window.addEventListener('keydown', onKey);
    scrollCleanup = () => {
      targets.forEach((t) => t.removeEventListener('scroll', onScroll));
      window.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', onKey);
    };
  }

  function wireInternalLinks(root) {
    root.querySelectorAll('a[data-tour-link="1"]').forEach((a) => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const id = (a.getAttribute('href') || '').replace('#', '');
        if (id) navigate(id);
      });
    });
  }

  function addCopyButtons(root) {
    root.querySelectorAll('pre.code').forEach((pre) => {
      if (pre.querySelector('.copy')) return;
      const btn = document.createElement('button');
      btn.className = 'copy';
      btn.textContent = 'Copy';
      btn.onclick = () => {
        const txt = pre.querySelector('code').innerText;
        navigator.clipboard?.writeText(txt);
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
      };
      pre.appendChild(btn);
    });
  }

  function renderQuiz() {
    const main = document.getElementById('main');
    state.quiz = state.quiz || { answers: {} };
    let html = '<div class="crumb">Final step</div>'
      + '<h1 class="pageTitle"><span class="icon">🎓</span>Graduation Quiz</h1>'
      + '<div class="summary">Answer a few quick questions to earn your Buddy Graduate badge.</div>';
    DATA.quiz.forEach((q, qi) => {
      html += '<div class="quiz-q" data-qi="' + qi + '"><div class="q">'
        + (qi + 1) + '. ' + escapeHtml(q.q) + '</div>';
      q.choices.forEach((c, ci) => {
        html += '<button class="opt" data-ci="' + ci + '">' + escapeHtml(c) + '</button>';
      });
      html += '</div>';
    });
    html += '<div class="quiz-score" id="score"></div>';
    html += '<div class="actions"><button class="btn warm" id="btnFinish">Finish & earn badge 🎉</button></div>';
    main.innerHTML = html;

    main.querySelectorAll('.quiz-q').forEach((qEl) => {
      const qi = +qEl.dataset.qi;
      qEl.querySelectorAll('.opt').forEach((opt) => {
        opt.onclick = () => {
          const ci = +opt.dataset.ci;
          state.quiz.answers[qi] = ci;
          saveState();
          qEl.querySelectorAll('.opt').forEach((o) => o.classList.remove('right','wrong'));
          opt.classList.add(ci === DATA.quiz[qi].answer ? 'right' : 'wrong');
          if (ci !== DATA.quiz[qi].answer) {
            const correct = qEl.querySelectorAll('.opt')[DATA.quiz[qi].answer];
            if (correct) correct.classList.add('right');
          }
          updateScore();
        };
        // Restore prior selection
        if (state.quiz.answers[qi] === +opt.dataset.ci) opt.click();
      });
    });
    function updateScore() {
      let correct = 0;
      DATA.quiz.forEach((q, i) => { if (state.quiz.answers[i] === q.answer) correct++; });
      document.getElementById('score').textContent =
        'Score: ' + correct + ' / ' + DATA.quiz.length
        + (correct === DATA.quiz.length ? '  🌟 Perfect!' : '');
    }
    updateScore();
    document.getElementById('btnFinish').onclick = () => {
      markDone('__quiz__');
      alert('🎉 You finished the Buddy Tour!\nYou are ready to ship your first contribution.');
    };
  }

  // Search across all sections.
  document.getElementById('search').addEventListener('input', (e) => {
    const term = e.target.value.trim().toLowerCase();
    if (!term) { navigate(currentId); return; }
    const main = document.getElementById('main');
    const hits = [];
    DATA.sections.forEach((s) => {
      const txt = (s.title + ' ' + s.summary + ' ' + s.html).toLowerCase();
      if (txt.includes(term)) hits.push(s);
    });
    main.innerHTML = '<h1 class="pageTitle"><span class="icon">🔎</span>Search: ' + escapeHtml(term) + '</h1>'
      + '<div class="search-hits">' + hits.length + ' section(s) match.</div>'
      + hits.map((s) => '<div class="quiz-q" style="cursor:pointer" data-id="' + s.id + '">'
        + '<div class="q">' + s.icon + ' ' + escapeHtml(s.title) + '</div>'
        + '<div style="color:var(--muted);font-size:13px">' + escapeHtml(s.summary || '(open to view)') + '</div></div>').join('');
    main.querySelectorAll('[data-id]').forEach((el) => {
      el.onclick = () => { document.getElementById('search').value = ''; navigate(el.dataset.id); };
    });
  });

  // Start: honor URL hash if present.
  const hash = (location.hash || '').replace('#','');
  const start = ALL_STEPS.find((s) => s.id === hash) ? hash : ALL_STEPS[0].id;
  navigate(start);
})();
</script>
